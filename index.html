        [119,6,"Ku Klux Klan (Reconstruction)","A white supremacist terrorist organization founded in Pulaski, Tennessee (1865). The Klan used violence (lynching, whipping, burning) to intimidate Black voters, white Republicans, and anyone who supported Reconstruction. They targeted schools, churches, and political leaders. The Klan was essentially the military arm of the Democratic Party in the South.","White resentment of Reconstruction – Black voting, Black office‑holders, federal troops, and the economic empowerment of freed people.","The Klan succeeded in suppressing Black voting in many areas. Congress passed Enforcement Acts (1870‑71) that authorized federal troops and prosecutions to crush the Klan. Thousands were arrested, and the Klan temporarily collapsed. However, after 1877, new paramilitary groups (White Leagues, Red Shirts) continued the violence, helping 'Redeemers' take over Southern governments.","Continuity – White supremacist violence continued after Reconstruction (lynching became even more common in the 1890s). Change – The first Klan was suppressed by federal force under the Enforcement Acts. Later Klans (1915, 1920s) were revived but targeted different groups (immigrants, Catholics, Jews) as well as Black Americans.","First Klan (Reconstruction) vs. Second Klan (1915‑1920s). First Klan was a Southern, rural, terrorist organization focused on Black voters and Republicans. Second Klan was national (big in Midwest and West), anti‑immigrant, anti‑Catholic, anti‑Jewish, and also anti‑Black. The second Klan had millions of members and openly controlled state governments (e.g., Indiana). The first Klan was crushed; the second Klan faded due to scandals and internal feuds."],
        [120,6,"Compromise of 1877","An informal, unwritten deal that resolved the disputed 1876 presidential election. Democrat Samuel Tilden won the popular vote but was one electoral vote short of a majority, with 20 electoral votes disputed in four states (Florida, Louisiana, South Carolina, Oregon). An electoral commission awarded all disputed votes to Republican Rutherford B. Hayes. In exchange, Hayes agreed to withdraw federal troops from the South, effectively ending Reconstruction.","The election was too close to call; both parties claimed victory. The country was weary of Reconstruction; the North was turning its attention to economic issues (railroads, tariffs, labor unrest).","Reconstruction ended. Federal troops left the South. 'Redeemer' governments (white Southern Democrats) took control. Jim Crow laws began to be passed, and Black voting rights were systematically stripped away. The Compromise also gave Southern Democrats the promise of federal funding for internal improvements (a railroad), which benefited the South economically.","Continuity – Backroom political deals were common in the Gilded Age. Change – The Compromise abandoned 4 million Black Southerners to nearly a century of segregation, disenfranchisement, and violence. It marked the end of federal protection for civil rights until the 1960s.","Compromise of 1877 vs. Missouri Compromise (1820). Both resolved sectional crises; both postponed (or ended) federal action on slavery/civil rights. The Missouri Compromise bought time (34 years) before the Civil War; the Compromise of 1877 bought peace for white Southerners at the cost of Black rights, lasting until the 1950s‑60s."],
        [121,6,"Transcontinental Railroad (Completed 1869)","The first railroad to connect the Atlantic and Pacific coasts. The Union Pacific built westward from Omaha (using Irish laborers); the Central Pacific built eastward from Sacramento (using Chinese laborers). They met at Promontory Summit, Utah, on May 10, 1869, where a golden spike was driven.","The Pacific Railway Acts (1862, 1864) provided land grants and loans to the railroad companies. The federal government wanted to connect California to the rest of the Union, promote westward settlement, and transport goods and troops.","Created a national market – goods could now move coast to coast in days instead of months. Destroyed the buffalo herds (the railroad split the herds, and hunters killed them for hides and sport). Enabled the conquest of Native peoples (the railroad brought soldiers and settlers). Led to the creation of time zones (1883).","Continuity – Railroads continued to expand (by 1890, over 160,000 miles). Change – The transcontinental railroad was the first to connect the coasts, making the U.S. truly continental. It transformed the Great Plains from a 'Great American Desert' to a highway of commerce and settlement.","Transcontinental Railroad vs. Erie Canal (1825). The canal connected the Great Lakes to the Hudson River; the railroad connected the Atlantic to the Pacific. The canal opened the Midwest; the railroad opened the West. Both were government‑funded infrastructure projects (the canal by New York State; the railroad by federal land grants). Both transformed the economy."],
        [122,6,"Morrill Land‑Grant Act (1862 & 1890)","Federal law that granted each state (that remained in the Union) 30,000 acres of public land per member of Congress. The land was to be sold to fund the establishment of colleges teaching 'agriculture and the mechanic arts.' Led to the creation of many state universities (e.g., Michigan State, Penn State, Iowa State, etc.). A second Morrill Act (1890) required states to admit Black students or provide separate land‑grant colleges (leading to historically Black land‑grant universities like Tuskegee, Alcorn State, etc.).","Need for practical education in farming and engineering; absence of federal funding for higher education.","Created the system of land‑grant universities, which democratized higher education and promoted agricultural and technical research (Cooperative Extension Service). Expanded access to college for the middle class.","Continuity – Government support for education (Northwest Ordinance set aside land for schools). Change – The Morrill Acts were the first federal funding for higher education. Shift from private and church‑based colleges to public universities.","Morrill Act vs. GI Bill (1944). Both expanded access to education; Morrill Act created the institutions; GI Bill sent veterans to those and other colleges. Both transformed American higher education."],
        [123,6,"Gilded Age (1870s‑1900s)","Term coined by Mark Twain and Charles Dudley Warner in their 1873 novel The Gilded Age. Describes the era of rapid industrialization, massive economic growth, extreme wealth inequality, political corruption, and social conflict. 'Gilded' means covered with a thin layer of gold; the era appeared prosperous but hid deep problems.","Second Industrial Revolution; laissez‑faire capitalism; weak government regulation; waves of immigration and westward expansion.","Rise of trusts and monopolies; labor unrest (Haymarket, Homestead, Pullman); populist and progressive reforms; the 'Gospel of Wealth' and Social Darwinism.","Continuity – Industrialization continued, and inequality remains a perennial issue. Change – The Gilded Age was the first time that industrial capitalism came to dominate the U.S. economy. The term itself is a critique of the era's hollow prosperity.","Gilded Age vs. Progressive Era. Gilded Age: laissez‑faire, weak government, corruption, inequality. Progressive Era: reform, regulation, trust‑busting, consumer protection, conservation. The Progressive Era was a reaction to the Gilded Age."],
        [124,6,"Andrew Carnegie & Vertical Integration","Andrew Carnegie dominated the steel industry through vertical integration – controlling every stage of production, from iron ore mines to steel mills to railroads to distribution. He used the Bessemer process to mass‑produce steel cheaply. He later wrote the Gospel of Wealth (1889), arguing that the rich had a moral duty to give away their fortunes to benefit society.","The demand for steel exploded (railroads, skyscrapers, bridges). Carnegie was an immigrant from Scotland who rose from poverty.","Carnegie Steel became the largest steel company in the world. Carnegie himself became one of the richest men in history. He later gave away about $350 million (billions in today's dollars) to build libraries, universities (Carnegie Mellon), concert halls (Carnegie Hall), and peace projects. His model of vertical integration was copied by other industrialists.","Continuity – Industrial monopolies and trusts appeared everywhere in the Gilded Age. Change – Carnegie's vertical integration was a new business model (control every step). The Gospel of Wealth influenced philanthropy for generations, but it also justified huge inequality (the rich earned their wealth; they could decide to give it away voluntarily).","Vertical integration (Carnegie) vs. Horizontal integration (Rockefeller). Vertical: owning all stages of production (mine to market). Horizontal: buying up all competitors in a single stage of production (Standard Oil controlled 90% of oil refining). Both aimed to eliminate competition and control prices, but vertical integration also improved efficiency by coordinating supply chains."],
        [125,6,"John D. Rockefeller & Horizontal Integration","John D. Rockefeller dominated the oil refining industry through horizontal integration – he bought up or drove out all his competitors, eventually controlling over 90% of U.S. oil refining. He used trusts (a legal device where stockholders handed their shares to a board of trustees) to consolidate control. The Standard Oil Trust was the model for corporate monopolies.","The oil industry was chaotic – many small refiners competing, leading to price wars and waste. Rockefeller saw efficiency and stability in consolidation.","Standard Oil was the most famous monopoly of the Gilded Age. It drove prices down (efficient) but also crushed competition and bribed politicians. The Sherman Antitrust Act (1890) was passed in response to public anger, but it was initially weak. In 1911, the Supreme Court ordered Standard Oil broken up into 34 independent companies (Exxon, Mobil, Chevron, etc.).","Continuity – Monopolies continued to be a problem (AT&T, Microsoft, Google). Change – Rockefeller created the first large‑scale, nationwide monopoly. His use of the trust structure allowed him to circumvent state laws that forbade corporations from owning out‑of‑state assets. The Sherman Act was specifically aimed at trusts like his.","Horizontal integration vs. Vertical integration (see above). Horizontal eliminates competition; vertical improves efficiency. Both limit competition, but horizontal integration is more directly monopolistic."],
        [126,6,"Gospel of Wealth (Andrew Carnegie, 1889)","Essay by Andrew Carnegie arguing that the wealthy have a moral duty to use their fortunes for the public good through strategic philanthropy (libraries, universities, museums, etc.). The rich are 'trustees' for their surplus wealth.","Gilded Age inequality; Carnegie's own rise from poverty; religious and moral beliefs.","Inspired generations of philanthropists (Rockefeller, Ford, Gates). Also used to justify wealth inequality (the rich earned it; they will give it away). Created the model of large‑scale, systematic philanthropy.","Continuity – Wealthy people have always given to charity (e.g., Peabody). Change – The Gospel of Wealth argued that giving should be strategic and done during the giver's lifetime, not after death. Shift from haphazard charity to organized philanthropy.","Gospel of Wealth vs. Social Darwinism. Gospel: rich have a duty to help the poor; Social Darwinism: rich are fittest, no duty to the poor. Carnegie believed both – he was a ruthless competitor and a generous philanthropist."],
        [127,6,"Social Darwinism (late 19th century)","An ideology that applied Charles Darwin's theory of evolution (natural selection, survival of the fittest) to human society and business. It argued that the rich were 'fit' and the poor were 'unfit,' and that government should not interfere with the natural order (laissez‑faire). It was used to justify huge wealth inequality, oppose unions, resist government regulation, and support imperialism (strong nations dominate weak ones).","Darwin's On the Origin of Species (1859) was applied to sociology by Herbert Spencer (who coined 'survival of the fittest'). Gilded Age industrialists found it convenient.","Social Darwinism was used to oppose minimum wage laws, safety regulations, child labor laws, and welfare. It also fueled nativism (immigrants might 'dilute' the Anglo‑Saxon race) and imperialism (the U.S. had a duty to 'civilize' weaker peoples). The ideology faded after the 1890s, but its influence persisted.","Continuity – Justifications for inequality existed before (divine right, natural law). Change – Social Darwinism used 'science' to justify wealth and power. Earlier justifications were religious or philosophical; this one claimed to be biological and inevitable.","Social Darwinism vs. Gospel of Wealth (Carnegie). Both accept that wealth inequality is inevitable. Social Darwinism says the rich have no duty to the poor (let them perish). The Gospel of Wealth says the rich have a duty to use their wealth for the public good (libraries, universities). Carnegie believed both – he was a Social Darwinist in business and a philanthropist in retirement."],
        [128,6,"Knights of Labor (1869–1886)","One of the first national labor unions. It was open to all workers: skilled, unskilled, women, African Americans, and immigrants (but not Chinese). Its goals included the 8‑hour workday, the end of child labor, equal pay for equal work, and the creation of worker‑owned cooperatives (socialist, not capitalist). It grew to over 700,000 members.","The Gilded Age saw appalling working conditions, child labor, 80‑hour workweeks, and no safety regulations. Workers had almost no power against corporations.","The Knights organized successful strikes, especially against railroads (Great Railroad Strike of 1877, though that was mostly spontaneous). After the Haymarket Riot (1886) in Chicago, when a bomb killed police officers, the Knights were falsely blamed. Public opinion turned against unions, and the Knights collapsed. They were replaced by the more conservative American Federation of Labor (AFL).","Continuity – Labor organizing continued (AFL, CIO, etc.). Change – The Knights were a broad, inclusive, reform‑oriented union seeking to transform society. The AFL was narrow, skilled‑only, and focused on 'bread and butter' issues (wages, hours, safety). The Knights faded, but many of their reform goals eventually became law.","Knights of Labor vs. American Federation of Labor (AFL). Knights: open to all, sought political and economic reform (cooperatives, 8‑hour day, end child labor). AFL: skilled workers only, focused on higher wages and shorter hours, avoided radical politics. Knights were idealistic; AFL was pragmatic. The Knights collapsed; the AFL survived to become the largest union."],
        [129,6,"Haymarket Riot (1886)","A labor protest in Chicago's Haymarket Square on May 4, 1886, demanding an 8‑hour workday. Someone threw a bomb at police; police then fired into the crowd. Seven police officers and at least four civilians were killed (many more wounded). Eight anarchist labor leaders were convicted; four were hanged.","Tensions between labor and police; the national 8‑hour day movement (May 1, 1886, was a massive strike day); a history of labor violence (the Great Railroad Strike of 1877). The bomb thrower was never identified, but authorities blamed the anarchist movement.","The Knights of Labor were falsely blamed (even though they had no involvement) and collapsed. The public turned against unions – 'labor radicalism' was equated with violence and anarchy. May Day (May 1) became International Workers' Day. The Haymarket martyrs became heroes to the left.","Continuity – Labor violence continued (Homestead, Pullman). Change – Haymarket discredited the entire labor movement for years. It led to a wave of arrests and the repression of anarchist and socialist groups. It also created the myth of the 'dangerous foreign radical' (most of the convicted were immigrants).","Haymarket Riot vs. Pullman Strike (1894). Haymarket was a small protest that turned violent when a bomb exploded; it was blamed on anarchists. Pullman was a nationwide railroad strike that was broken by federal troops and a court injunction (using the Sherman Antitrust Act). Haymarket hurt labor's reputation; Pullman showed the government's willingness to crush unions."],
        [130,6,"American Federation of Labor (AFL) – founded 1886","A national union federation led by Samuel Gompers. It focused only on skilled workers (craft unions), not unskilled laborers. It fought for 'bread and butter' issues: higher wages, shorter hours, better working conditions. It avoided radical politics (no socialism or cooperatives), preferring collective bargaining and strikes. It was the most successful and enduring union of the Gilded Age.","The collapse of the Knights of Labor (blamed for the Haymarket Riot). Skilled workers had more bargaining power; they wanted practical results, not revolutionary change.","The AFL grew to over 1 million members by 1900. It became the model for American unionism: pragmatic, non‑revolutionary, and focused on immediate gains. It excluded unskilled workers, women, and African Americans (initially). It survived the anti‑union backlash of the 1890s and became the core of the New Deal labor movement.","Continuity – Craft unions existed before (molders, cigarmakers). Change – The AFL united craft unions into a single, powerful federation. It set the agenda for labor for the next 50 years: skilled workers, high dues, political action (but not a labor party), and acceptance of capitalism.","AFL vs. Industrial Workers of the World (IWW, 1905). AFL: skilled workers, pragmatic, non‑revolutionary, accepted capitalism. IWW: unskilled, immigrants, women, miners – all workers in 'one big union,' revolutionary (wanted to overthrow capitalism), more radical tactics. The IWW was smaller and persecuted; the AFL was larger and eventually mainstream."],
        [131,6,"Chinese Exclusion Act (1882)","First federal law banning immigration based on race/nationality. Prohibited Chinese laborers from entering the U.S. for 10 years (later extended, then made permanent until 1943). Also barred Chinese immigrants already in the U.S. from becoming naturalized citizens.","Anti‑Chinese violence (Rock Springs Massacre 1885); fear that Chinese workers took jobs from whites; racial prejudice; California politicians (Denis Kearney) whipped up anti‑Chinese sentiment.","Chinese population in the U.S. declined sharply. Set precedent for future immigration restrictions (National Origins Act 1924). Repealed in 1943 as a symbolic gesture during WWII (China was an ally).","Continuity – Immigration restriction continued (1924 quotas). Change – First time Congress banned an entire nationality. Shift from open immigration to race‑based exclusion.","Chinese Exclusion Act vs. National Origins Act (1924). Both restricted immigration by nationality; Chinese Exclusion targeted a single group; 1924 set quotas for all nations."],
        [132,6,"Pendleton Act (1883)","Civil Service Reform Act. Created the U.S. Civil Service Commission and required that some federal jobs be filled through competitive exams (merit) rather than political patronage (spoils system). Initially covered about 10% of federal positions.","Assassination of President James Garfield by a disappointed office‑seeker (Charles Guiteau). Public outrage over the spoils system.","Gradually expanded to cover most federal jobs. Reduced corruption and political favoritism. Marked the beginning of the professional civil service.","Continuity – Patronage had been the norm since Jackson. Change – The Pendleton Act introduced merit‑based hiring. Shift from 'to the victor belong the spoils' to a professional bureaucracy.","Pendleton Act vs. Jackson's spoils system. Jackson believed in rotation in office (loyalty over competence). Pendleton prioritized competence and exam performance."],
        [133,6,"Interstate Commerce Act (1887)","First federal law to regulate private industry. Created the Interstate Commerce Commission (ICC) to oversee railroads. Prohibited discriminatory rates, rebates, and pooling. Required railroads to publish rates.","Railroad abuses (price discrimination, rebates to big shippers); Supreme Court's Wabash Case (1886) struck down state railroad regulations; farmers and small businesses demanded federal action.","Set precedent for federal regulatory agencies (FTC, FCC, SEC). ICC initially weak but gained power over time. Marked shift from laissez‑faire to federal oversight.","Continuity – Federal agencies continued to be created (FDA, FTC, EPA). Change – ICA was first time Congress used commerce power to regulate an industry directly.","Interstate Commerce Act vs. Sherman Antitrust Act (1890). ICA targeted railroads specifically; Sherman Act targeted monopolies generally. ICA created a regulatory agency; Sherman Act relied on courts."],
        [134,6,"Sherman Antitrust Act (1890)","First federal law to outlaw monopolies and trusts that restrained trade. Prohibited 'every contract, combination… or conspiracy in restraint of trade.' Vague language allowed courts to narrow it.","Public anger at monopolies (Standard Oil, sugar trust, railroad trusts); Gilded Age distrust of big corporations; Populist and Progressive demands.","Initially weak and used more against labor unions (Pullman Strike 1894) than against trusts. After 1911, used to break up Standard Oil and American Tobacco. Set foundation for later antitrust (Clayton Act, FTC).","Continuity – Antitrust enforcement continues (Microsoft, AT&T, Google). Change – Sherman Act's vagueness allowed courts to limit it. Shift from weak to stronger enforcement after Progressive Era.","Sherman Act vs. Clayton Act (1914). Sherman general and vague; Clayton specific (prohibited price discrimination, interlocking directorates, exempted unions)."],
        [135,6,"Dawes Act (1887)","A federal law that broke up tribal lands into individual plots (160 acres per family). The land was held in trust for 25 years, after which the Native American owner would receive full title and U.S. citizenship. 'Surplus' land (the remainder after each family got a plot) was sold to white settlers.","The desire to 'civilize' Native Americans by forcing them to adopt private property, farming, and U.S. citizenship. Also, white settlers and railroads wanted access to reservation lands.","Native Americans lost about 90 million acres (2/3 of their remaining land). Communal tribal structures were destroyed. Poverty and cultural disruption increased. The Dawes Act is considered one of the most destructive federal policies toward Native peoples. It was reversed by the Indian Reorganization Act of 1934.","Continuity – Assimilation had been policy before (boarding schools, bans on Native languages and religions). Change – The Dawes Act used private property as a weapon. It assumed that if Natives owned land individually, they would adopt farming and become 'civilized.' In reality, the land was often unsuitable for farming, and the surplus was stolen.","Dawes Act vs. Indian Removal Act (1830). Removal forced tribes to move west; the Dawes Act stripped them of their land even there. Removal was about relocating Natives out of the way; the Dawes Act was about destroying tribal identity altogether."],
        [136,6,"Wounded Knee Massacre (1890)","The last major armed conflict of the Indian Wars. U.S. Army troops (the 7th Cavalry, Custer's old regiment) surrounded a group of Lakota Sioux (mostly women, children, and elderly) at Wounded Knee Creek, South Dakota. A shot was fired (no one knows who), and the soldiers opened fire with cannons and rifles. About 300 Lakota were killed (many of them women and children) and 25 soldiers died (many from friendly fire). At least 20 soldiers received the Medal of Honor (later some were rescinded).","The Ghost Dance movement – a religious revival that promised the return of the buffalo, the disappearance of whites, and the resurrection of ancestors. Army officials feared an uprising and tried to disarm the Lakota.","The Indian Wars ended. The frontier was officially declared 'closed' by the 1890 census. Wounded Knee became a symbol of the brutality of westward expansion and the betrayal of Native peoples. It remains a powerful, painful memory for Native Americans.","Continuity – Other massacres occurred (Sand Creek, 1864). Change – Wounded Knee was the last major confrontation; after it, Native resistance was crushed. The 'frontier' was closed, and the U.S. turned its attention overseas (Spanish‑American War, 1898).","Wounded Knee vs. Sand Creek (1864). Both massacres of peaceful Natives; Sand Creek militia; Wounded Knee U.S. Army."],
        [137,6,"Booker T. Washington (c. 1881–1915)","Educator, author, and leading Black leader. Founded Tuskegee Institute (Alabama). Advocated for accommodation and economic self‑help. Delivered 'Atlanta Compromise' speech (1895): urged Black Americans to accept segregation temporarily in exchange for vocational training and economic opportunity.","Jim Crow; lynchings; disenfranchisement; Washington believed political equality would follow economic progress.","Became most powerful Black leader of his era (advised presidents, controlled patronage). Criticized by W.E.B. Du Bois for accepting segregation. His philosophy shaped Black education for decades.","Continuity – Black leaders debated strategy (accommodation vs. agitation). Change – Washington's influence peaked early 1900s; NAACP and Du Bois challenged his approach after 1909. Shift to demands for immediate civil rights.","Washington vs. Du Bois. Washington: accommodation, vocational education, economic self‑help; Du Bois: immediate political equality, liberal arts education (Talented Tenth), agitation."],
        [138,6,"W.E.B. Du Bois (1868–1963)","Civil rights activist, sociologist, historian, and co‑founder of NAACP (1909). First Black Ph.D. from Harvard. Wrote The Souls of Black Folk (1903) criticizing Washington. Advocated for immediate political equality, higher education for Black elites (Talented Tenth).","Jim Crow; lynchings; Washington's dominance; Du Bois saw accommodation as surrender.","Helped launch Niagara Movement (1905) and NAACP; edited The Crisis; organized for anti‑lynching and equal rights. Later moved to Ghana, became socialist.","Continuity – Black intellectual activism continued (King, Malcolm X). Change – Du Bois pioneered sociological study of race (Philadelphia Negro) and used data to challenge racism.","Du Bois vs. Washington (above). Also: Du Bois vs. Marcus Garvey. Du Bois integrationist; Garvey separatist."],
        [139,6,"Ida B. Wells (1862–1931)","Journalist, anti‑lynching crusader, and civil rights activist. Documented lynchings in pamphlets (Southern Horrors, The Red Record). Co‑founder of NAACP. Also fought for women's suffrage.","Three friends lynched in Memphis (1892); Wells owned newspaper 'Free Speech' and publicized lynchings.","Exposed lynching as racial terrorism (not punishment for crime). Forced national debate. Her work laid foundation for anti‑lynching legislation (never passed in her lifetime, but raised awareness).","Continuity – Muckrakers later used similar investigative methods. Change – Wells was a Black woman doing investigative journalism in Jim Crow South.","Ida B. Wells vs. Booker T. Washington. Wells challenged white supremacy directly with data; Washington accommodated."],
        [140,6,"NAACP (National Association for the Advancement of Colored People) – founded 1909","Civil rights organization founded by multiracial group including W.E.B. Du Bois, Ida B. Wells, Jane Addams, Oswald Garrison Villard. Used legal challenges, lobbying, and grassroots activism to fight segregation and discrimination.","Race riots (Springfield 1908); failure of Booker T. Washington's accommodation; need for national civil rights organization.","Led legal campaign culminating in Brown v. Board (1954); lobbied for anti‑lynching laws; became leading civil rights group of 20th century.","Continuity – Earlier civil rights groups existed (Niagara Movement, National Equal Rights League). Change – NAACP was interracial, national, and focused on legal strategy. Still active today.","NAACP vs. Southern Christian Leadership Conference (SCLC, 1957). NAACP focused on courts and legislation; SCLC focused on nonviolent direct action."],
        [141,6,"Homestead Strike (1892)","A violent strike at the Carnegie Steel plant in Homestead, Pennsylvania (near Pittsburgh). The plant manager, Henry Frick (a ruthless businessman), cut wages. The union (Amalgamated Iron and Steel Workers) refused. Frick locked out the workers and hired 300 Pinkerton detectives to break the strike. The workers fought back with guns, killing 7 Pinkertons; the state militia was called in, and the union was crushed. Frick survived an assassination attempt by an anarchist (Alexander Berkman).","Wage cuts; the union's refusal to accept them; Frick's determination to break the union; the Gilded Age pattern of corporations using private police and the state to crush labor.","The union at Homestead was destroyed; steel unionization was set back for decades. Carnegie (who publicly supported unions) was revealed as hypocritical (he was on vacation in Scotland while Frick did the dirty work). The strike showed that workers would fight, but also that the government would always side with corporations.","Continuity – Strikebreaking with Pinkertons and state militia was common (Great Railroad Strike 1877, Pullman 1894). Change – The Homestead strike was the most violent of the early 1890s and the most famous. It permanently damaged the reputation of Andrew Carnegie.","Homestead Strike vs. Pullman Strike (1894). Homestead was a single plant; Pullman was a nationwide railroad strike. Homestead used Pinkertons and state militia; Pullman used federal troops and a court injunction."],
        [142,6,"Populist Party (People's Party) – 1892","A third party formed by farmers (Grange, Farmers' Alliances) and some industrial workers. The Omaha Platform (1892) demanded: (1) direct election of U.S. senators (17th Amendment, 1913); (2) unlimited coinage of silver (to inflate currency and relieve debt); (3) a graduated income tax (16th Amendment, 1913); (4) government ownership of railroads, telegraph, and telephone; (5) an 8‑hour workday; (6) the secret ballot; (7) restrictions on immigration.","Falling crop prices; railroad monopolies charging high freight rates; high interest rates; the gold standard (which kept prices low, benefiting creditors but hurting debtors). Farmers were in perpetual debt.","The Populist Party won several state elections and had a strong showing in 1892 (over 1 million votes). In 1896, they supported Democrat William Jennings Bryan (the 'Cross of Gold' speech) but lost to William McKinley. The party dissolved after 1896, but many of its reforms were passed in the Progressive Era (income tax, direct election of senators, 8‑hour day for federal workers, secret ballot).","Continuity – Farmer activism continued (Grange, Farmers' Alliances). Change – The Populists created a national political party (not just a movement). They were the most successful third party of the 19th century, and their platform anticipated Progressive reforms.","Populist Party vs. Progressive Party (1912, 'Bull Moose'). Populists emerged from farmers and laborers; Progressives from the urban middle class. Populists focused on monetary policy (silver) and railroad ownership; Progressives focused on trust‑busting, conservation, and consumer protection."],
        [143,6,"Pullman Strike (1894)","A nationwide railroad strike led by the American Railway Union (ARU) and its president, Eugene V. Debs. The Pullman Palace Car Company had cut wages but refused to cut rents in its company town. The ARU declared a boycott of Pullman cars, which spread across the country, crippling rail traffic. Federal troops were sent in (by President Grover Cleveland) over the objection of Illinois Governor John Altgeld. A federal court issued an injunction (using the Sherman Antitrust Act) against the strike. Debs was arrested; the strike collapsed.","Wage cuts without rent reduction; the power of the ARU (Debs); the refusal of railroad companies to negotiate.","Debs was imprisoned (he later embraced socialism and ran for president five times). The Sherman Antitrust Act – intended to break up monopolies – was used for the first time to crush a labor union. The strike showed that the federal government would use its full power to protect railroads and commerce, not to protect workers.","Continuity – Government siding with corporations (Homestead, Great Railroad Strike). Change – Pullman was the first use of the Sherman Act (1890) against a union. It set a dangerous precedent that continued until the Clayton Act (1914) exempted unions.","Pullman Strike vs. Homestead Strike (1892). Homestead was a single plant; Pullman was nationwide. Homestead used Pinkertons and state militia; Pullman used federal troops and a federal injunction."],
        [144,6,"Social Gospel (late 19th – early 20th century)","A Protestant Christian movement that applied Christian ethics to social problems – poverty, slums, child labor, unsafe factories, racial injustice. It argued that Christians had a duty to reform society, not just save individual souls. Leaders: Washington Gladden, Walter Rauschenbusch. It led to settlement houses (Jane Addams' Hull House), the YMCA, the Salvation Army, and many Progressive reforms.","Industrial poverty, squalid urban conditions, the gap between rich and poor. A reaction to Social Darwinism (which said the poor deserved their fate). The legacy of the Second Great Awakening (reform as religious duty).","Inspired the settlement house movement, child labor laws, factory inspections, and the 'city reform' movement. Social Gospel ministers pushed for temperance, Sabbath laws, and anti‑prostitution campaigns. The movement laid the ideological groundwork for the New Deal and later civil rights activism (Martin Luther King Jr. was a Social Gospel minister).","Continuity – Religious reform movements existed before (abolitionism, temperance). Change – Social Gospel focused on the structural causes of poverty (capitalism, industrialization), not just individual sin. It shifted the focus from personal salvation to social salvation.","Social Gospel vs. Second Great Awakening (1800‑1840s). The Second Great Awakening emphasized individual conversion and moral reform (temperance, abolition); Social Gospel emphasized systemic change (poverty, labor rights, urban reform)."],
        [145,6,"'New South' (Henry Grady, 1880s)","Phrase popularized by Henry Grady, editor of the Atlanta Constitution, urging the South to industrialize, modernize, and diversify away from cotton monoculture and slavery‑based agriculture. Envisioned a South of factories, railroads, and cities, where whites and Blacks would work (but remain segregated). The 'New South' was to leave behind the 'Lost Cause' myth and embrace the future.","Devastation of the Civil War; failure of Reconstruction; need for economic growth; desire to attract Northern capital.","Limited industrialization (textile mills, tobacco processing, steel mills in Birmingham). However, most of the South remained agricultural and poor. The 'New South' largely preserved white supremacy and sharecropping. It did, however, begin a long transition that would accelerate after WWII.","Continuity – The South remained the poorest region, still predominantly agricultural and segregated. Change – Some industrialization did occur; the 'New South' rhetoric shifted public discourse toward modernization.","'New South' vs. 'Old South.' Old South was plantation‑based, slave labor, agrarian, and isolationist. New South claimed to be industrial, diversified, and integrated into the national economy."],
        [146,6,"Plessy v. Ferguson (1896)","Supreme Court case that upheld racial segregation under the doctrine of 'separate but equal.' Homer Plessy (1/8 Black, appeared white) sat in a whites‑only railroad car in Louisiana. He was arrested for violating the state's segregation law. The Supreme Court (7‑1) ruled that segregation was constitutional as long as facilities were equal.","Jim Crow laws were spreading across the South. Plessy deliberately challenged the law. The Court's majority argued that segregation did not imply the inferiority of Black people (even though everyone knew it did).","'Separate but equal' became the law of the land for over 50 years. It legalized segregation in schools, transportation, public accommodations, and housing. It was not overturned until Brown v. Board of Education (1954). In practice, separate was never equal; Black facilities were always inferior.","Continuity – Segregation existed before Plessy (de facto in the North, de jure in the South after Reconstruction). Change – Plessy gave segregation the full force of Supreme Court approval. It made it much harder to challenge Jim Crow laws. The lone dissenter, Justice John Marshall Harlan, wrote: 'Our Constitution is color‑blind.'","Plessy v. Ferguson (1896) vs. Brown v. Board (1954). Plessy said separate but equal is constitutional; Brown said separate is inherently unequal. Plessy upheld Jim Crow; Brown dismantled it."]
    [147,7,"Spanish‑American War (1898)","A brief war between the United States and Spain, fought mainly in Cuba and the Philippines. The U.S. won easily. The Treaty of Paris (1898) gave the U.S. Guam, Puerto Rico, and the Philippines (for $20 million). Cuba was granted independence, but the Platt Amendment (1901) gave the U.S. the right to intervene there and lease Guantanamo Bay.","Cuban independence struggle against Spain (1895‑98); yellow journalism (Hearst and Pulitzer newspapers exaggerated Spanish atrocities); the sinking of the USS Maine (Feb 15, 1898) – a U.S. battleship exploded in Havana harbor, killing 260; 'Remember the Maine!' was the rallying cry; the De Lôme Letter (insulted President McKinley).","The U.S. emerged as a world power with an overseas empire. It fought the Philippine‑American War (1899‑1902) to crush Filipino independence (a brutal conflict). The debate over imperialism split the nation (Anti‑Imperialist League, supported by Carnegie, Twain, Gompers). The war also marked the rise of Theodore Roosevelt (Rough Riders) and his path to the presidency.","Continuity – U.S. expansion continued (earlier Manifest Destiny). Change – The Spanish‑American War gave the U.S. overseas colonies (not contiguous territory). It marked a shift from continental expansion (Manifest Destiny) to overseas imperialism.","Spanish‑American War vs. Mexican‑American War (1846‑48). Both were U.S. victories that added territory. The Mexican War added land in North America (the Southwest). The Spanish‑American War added islands in the Caribbean and Pacific (Puerto Rico, Guam, Philippines) and made Cuba a protectorate. Both were driven by expansionist ideology (Manifest Destiny then; 'civilizing mission' in 1898)."],
        [148,7,"Open Door Policy (1899)","A set of diplomatic notes sent by U.S. Secretary of State John Hay to the major powers (Britain, Germany, France, Italy, Russia, Japan) with interests in China. It proposed that all nations should have equal trading rights in China (no exclusive spheres of influence) and that China's territorial integrity should be preserved.","The 'scramble for concessions' – European powers and Japan were carving China into exclusive spheres of influence (railroad rights, mining rights, leaseholds). The U.S. feared being shut out of the Chinese market.","The powers accepted the Open Door (reluctantly) because the U.S. had little military power to enforce it. The Open Door policy became the basis of U.S.‑China relations for decades. It also contributed to the Boxer Rebellion (1900) – Chinese nationalists attacked foreigners; the U.S. joined the multi‑national force that crushed the Boxers and demanded further concessions.","Continuity – The U.S. had sought access to Asian markets since the 19th century (Commodore Perry in Japan, 1854). Change – The Open Door was a formal diplomatic policy, not just commercial treaties. It asserted U.S. interests without using military force (until later).","Open Door Policy vs. Monroe Doctrine (1823). The Monroe Doctrine warned Europeans to stay out of the Western Hemisphere. The Open Door asked Europeans to keep China open to all. Both asserted U.S. interests without the ability to enforce them (initially). The Monroe Doctrine was eventually enforced by the U.S. Navy; the Open Door was never fully enforced and collapsed when Japan invaded Manchuria in 1931."],
        [149,7,"Platt Amendment (1901)","An amendment (written by Senator Orville Platt) attached to a U.S. army appropriations bill that specified conditions for the withdrawal of U.S. troops from Cuba after the Spanish‑American War. It was then added to the Cuban constitution. Conditions: (1) Cuba could not make treaties with other nations that impaired its independence; (2) Cuba would allow the U.S. to intervene 'for the preservation of Cuban independence, the maintenance of a government adequate for the protection of life, property, and individual liberty'; (3) Cuba would lease naval stations (Guantanamo Bay) to the U.S.","The U.S. wanted to control Cuba without officially annexing it (the Teller Amendment, 1898, had promised Cuba independence). The U.S. was concerned about instability in Cuba and wanted a naval base.","Cuba became a U.S. protectorate, not truly independent. The U.S. intervened repeatedly (1906‑09, 1912, 1917‑22). The Platt Amendment was repealed in 1934 (as part of FDR's Good Neighbor Policy). Guantanamo Bay remains a U.S. naval base.","Continuity – The U.S. had claimed a right to intervene in the Western Hemisphere (Roosevelt Corollary, 1904). Change – The Platt Amendment was the first explicit legal basis for U.S. intervention in a sovereign nation. It made Cuba a de facto colony.","Platt Amendment vs. Roosevelt Corollary (1904). The Platt Amendment applied specifically to Cuba; the Roosevelt Corollary claimed the right for the U.S. to intervene in any Latin American nation to prevent European intervention. Both were imperialist, but the Platt Amendment was a bilateral treaty; the Roosevelt Corollary was a unilateral policy."],
        [150,7,"Theodore Roosevelt's 'Square Deal' (1901–1909)","Roosevelt's domestic program – 'Three C's': Control of corporations (trust‑busting: broke up Northern Securities Co., over 40 trusts), Consumer protection (Pure Food and Drug Act and Meat Inspection Act, 1906, after Upton Sinclair's The Jungle), Conservation (created the U.S. Forest Service, added 230 million acres to public lands, worked with Gifford Pinchot). Roosevelt used the 'bully pulpit' to lead public opinion.","Progressive reform pressure; Gilded Age abuses (monopolies, unsafe food, deforestation).","Strengthened federal regulation of business and resources. Set precedents for an active presidency and conservation. Inspired later environmental and consumer movements.","Continuity – Antitrust existed (Sherman Act, 1890). Change – Roosevelt actively used it, distinguishing 'good' vs. 'bad' trusts. Conservation was new at this scale.","Square Deal vs. Wilson's New Freedom (1913‑1917). Roosevelt would regulate trusts; Wilson wanted to break them up and restore competition. Both progressive; different philosophies."],
        [151,7,"Muckrakers (1900s–1910s)","Investigative journalists who exposed corruption, unsanitary conditions, and social inequities. Key works: Ida Tarbell, History of Standard Oil (monopoly abuses); Upton Sinclair, The Jungle (meatpacking filth → Pure Food and Drug and Meat Inspection Acts); Jacob Riis, How the Other Half Lives (tenement poverty); Lincoln Steffens, The Shame of the Cities (city political corruption).","Industrial abuses, urban poverty, public appetite for reform, rise of mass‑circulation magazines.","Spurred Progressive legislation (Pure Food and Drug Act, Meat Inspection Act, antitrust enforcement). Reshaped public awareness. The term 'muckraker' (coined by Roosevelt) stuck.","Continuity – Exposés existed before (abolitionist press). Change – Muckrakers reached millions, used photo journalism, and directly drove legislative change. They professionalized investigative journalism.","Muckrakers vs. Watergate journalists (1970s). Both exposed high‑level corruption; muckrakers focused on industries and cities; Watergate on the presidency. Both led to reforms and legal changes."],
        [152,7,"16th Amendment (1913)","Granted Congress the power to levy a graduated (progressive) income tax without apportioning it among the states by population.","Revenue needs after tariff reductions; Populist/Progressive demand to tax wealthy; Supreme Court had struck down an 1894 income tax (Pollock v. Farmers' Loan & Trust).","Created the modern federal revenue system (income tax now provides about 50% of federal revenue). Enabled redistributive policies (the welfare state). The 16th is one of the most consequential amendments.","Continuity – An income tax existed during the Civil War (temporary). Change – The 16th made it permanent and constitutional. Shift from tariffs to income tax as primary revenue source.","16th Amendment vs. Populist Party platform. Populists demanded a graduated income tax; it took until 1913 (and a constitutional amendment) to get one. The Populists failed, but their idea eventually succeeded."],
        [153,7,"17th Amendment (1913)","Provided for the direct election of U.S. senators by popular vote, replacing the original system of selection by state legislatures.","Populist/Progressive demand to reduce corruption (state legislatures deadlocked, bribed, or left seats empty). Some states already had primary elections.","Senators became more accountable to voters; reduced (but didn't eliminate) legislative corruption. Shifted power from state legislatures to the people.","Continuity – House had always been directly elected. Change – Before 1913, senators were chosen by state legislatures, often as political favors. Direct election was a major democratic reform.","17th Amendment vs. original Constitutional design. Original: senators represented state governments (checks on federal power). 17th made them representatives of the people, reducing states' power."],
        [154,7,"Federal Reserve Act (1913)","Created the Federal Reserve System (the 'Fed') – a central bank with 12 regional banks, a Federal Reserve Board (appointed), and the ability to set interest rates, control money supply, perform open market operations, and act as lender of last resort.","Financial panics (Panic of 1907); need for a flexible currency and central control.","Stabilized the banking system; reduced bank failures (though not eliminated). Still exists as the nation's central bank, managing monetary policy, inflation, and employment.","Continuity – Central banking had existed (First and Second Banks of the U.S.). Change – The Fed was decentralized (12 regional banks) and had broader powers (open market operations, discount rate). It survived (unlike the earlier banks).","Federal Reserve vs. Second Bank of the U.S. (BUS). BUS was a single bank, privately owned, killed by Jackson. Fed is a decentralized public‑private hybrid, with controls over money supply and banking reserves. Fed is permanent."],
        [155,7,"Clayton Antitrust Act (1914)","Strengthened the Sherman Antitrust Act. Prohibited price discrimination, tying contracts, interlocking directorates, and anti‑competitive mergers. Crucially, it exempted labor unions from antitrust prosecution (labor is not a commodity), legalizing peaceful strikes, boycotts, and picketing.","Weakness of Sherman Act (used against unions, not monopolies). Progressive demand for stronger antitrust and labor protections.","Unions were protected from antitrust suits (overriding the Pullman precedent). The FTC was created (1914). The Act gave more teeth to trust‑busting.","Continuity – Antitrust enforcement continued. Change – Explicit labor exemption was a landmark; unions could now organize without fear of the Sherman Act. The Clayton Act is sometimes called the 'Magna Carta of labor.'","Clayton Act vs. Sherman Act (1890). Sherman vague, used often against unions; Clayton specific, exempts unions, forbids certain anticompetitive practices. Clayton also created the FTC."],
        [156,7,"Federal Trade Commission (FTC) – 1914","Independent federal agency created to enforce antitrust laws and protect consumers from unfair business practices. Investigates and stops deceptive advertising, monopolistic behavior.","Weakness of Sherman Act; need for expert agency to monitor business practices (not just courts).","Works alongside Clayton Act to prevent unfair competition. Still active (regulates advertising, privacy).","Continuity – Regulatory agencies (ICC precedent). Change – FTC is proactive (investigates) rather than reactive (courts). Shift from litigation to regulation.","FTC vs. ICC. ICC regulated a specific industry (railroads); FTC regulates unfair practices across all industries. Both Progressive Era; FTC broader mandate."],
        [157,7,"Keating‑Owen Act (1916)","The first federal law banning child labor (manufactured goods). It prohibited interstate commerce of products made by children under 14, and those made by children 14‑16 who worked more than 8 hours/day or nights. Struck down by Supreme Court in Hammer v. Dagenhart (1918) as exceeding Congress's commerce power.","Progressive reformers concerned about child exploitation; photos and reports from muckrakers.","Child labor continued until the Fair Labor Standards Act (1938). Showed limits of federal power before New Deal. The Court reversed course in United States v. Darby Lumber Co. (1941), upholding FLSA's child labor provisions.","Continuity – States had child labor laws (weak). Change – First federal attempt, struck down. Shift to federal regulation later, after the Court changed its interpretation of commerce power.","Keating‑Owen vs. Fair Labor Standards Act (1938). Keating‑Owen struck down on commerce clause grounds; FLSA upheld on the same clause, reflecting the Court's changed jurisprudence after the constitutional crisis of 1937."],
        [158,7,"Lusitania (1915)","British passenger liner sunk off Ireland by a German U‑boat; 1,198 died (128 Americans). The ship was carrying munitions (contraband), but Germany had not warned.","German unrestricted submarine warfare; U.S. neutrality. Germany had declared the waters around Britain a war zone.","Shifted American public opinion against Germany. President Wilson protested; Germany briefly suspended unrestricted submarine warfare (the 'Arabic pledge') after further incidents. The Lusitania was a key step toward U.S. entry into WWI.","Continuity – Neutral rights violations had occurred before (impressment, War of 1812). Change – The sinking of a civilian passenger ship (with Americans) caused outrage; modern media amplified the horror.","Lusitania vs. USS Maine (1898). Both ship sinkings that stirred public outrage; Maine (likely accident) led to Spanish‑American War; Lusitania led to WWI entry (two years later). Both used as propaganda."],
        [159,7,"Zimmermann Telegram (1917)","A secret diplomatic telegram from German Foreign Secretary Arthur Zimmermann to the German ambassador in Mexico, intercepted by British intelligence and shared with the U.S. It proposed that Mexico join Germany if the U.S. entered the war; Mexico would get back Texas, New Mexico, and Arizona (lost in Mexican‑American War).","German desperation to keep the U.S. neutral; unrestricted submarine warfare had already resumed (Feb 1, 1917). The telegram was sent in January 1917.","Outraged the American public. Contributed directly to Wilson's request for a declaration of war (April 2, 1917; passed April 6). The telegram is one of the most famous espionage coups in history.","Continuity – Foreign provocations preceded U.S. war entries. Change – The Zimmermann Telegram was an explicit offer to return U.S. territory to Mexico; it was intercepted and published, inflaming public opinion.","Zimmermann Telegram vs. De Lôme Letter (1898). The De Lôme Letter (Spanish minister insulting McKinley) contributed to Spanish‑American War; Zimmermann Telegram threatened U.S. territory. Both intercepted and used to whip up war sentiment."],
        [160,7,"U.S. Entry into WWI (1917)","Congress declared war on Germany on April 6, 1917. President Wilson had been re‑elected in 1916 on the slogan 'He kept us out of war.' The proximate causes: resumption of unrestricted submarine warfare (Feb 1917) and the Zimmermann Telegram.","Unrestricted submarine warfare; Zimmermann Telegram; Russian Revolution (March 1917) made the war about 'democracy vs. autocracy.' Wilson's idealism.","The U.S. tipped the balance to the Allies. The massive influx of fresh troops and war materiel broke the stalemate. U.S. emerged as a world power and played a leading role in the peace negotiations (Wilson's Fourteen Points). However, the Senate rejected the Treaty of Versailles and the League of Nations.","Continuity – U.S. entered European wars before (War of 1812). Change – WWI entry marked a permanent shift from isolationism to global involvement (though isolationism returned in the 1920s‑30s). Wilson's vision of collective security failed in his time but laid groundwork for the UN.","U.S. entry into WWI vs. entry into WWII (1941). WWI entry was provoked by submarine warfare and a telegram; WWII by Pearl Harbor. WWI led to a brief 'return to normalcy' and isolationism; WWII led to permanent U.S. global leadership."],
        [161,7,"Great Migration (1915–1970)","The mass movement of about 6 million African Americans from the rural South to industrial cities in the North, Midwest, and West. Main destinations: New York, Chicago, Detroit, Philadelphia, Cleveland, Los Angeles.","Push factors: Jim Crow laws, racial violence (lynchings), sharecropping debt, low wages. Pull factors: industrial jobs (wartime production), higher wages, some freedom.","Harlem Renaissance (literary/artistic flourishing); race riots (Chicago 1919, Tulsa 1921); change in urban demographics; spread of Black culture (jazz, blues) nationwide; laid the demographic foundation for the Civil Rights Movement (Black voters in the North became a political force).","Continuity – Black migration before (Exodusters, 1879). Change – The Great Migration was massive (6 million). It permanently shifted Black population from rural South to urban North/West. It transformed American music, politics, and culture.","Great Migration vs. European immigration. Both moved to industrial cities; European came from abroad; Black from American South. Both faced discrimination; Black faced Jim Crow in the South and de facto segregation in the North; European immigrants often assimilated into 'whiteness.'"],
        [162,7,"Fourteen Points & Treaty of Versailles (1919)","Wilson's January 1918 postwar plan: self‑determination, freedom of the seas, free trade, open diplomacy, reduction of arms, and a League of Nations (the 14th point). The actual Treaty of Versailles (June 1919) included harsh terms: Germany had to accept the 'war guilt' clause (Article 231), pay massive reparations, and surrender territory. Wilson compromised on many of his points to get the League, but the Senate still rejected the treaty.","Wilson's idealism; Allied need for a peace settlement; Europe's desire to punish Germany.","Germany humiliated, leading to economic collapse and Nazi rise (WWII). The U.S. Senate rejected the treaty (irreconcilables and reservationists), so the U.S. never joined the League. Isolationism reigned for two decades.","Continuity – Post‑war treaties existed before. Change – The U.S. Senate's rejection was unprecedented; the U.S. turned inward after leading the war. The League failed partly due to U.S. absence.","Fourteen Points vs. Treaty of Versailles. Wilson's points were idealistic and lenient; Versailles was punitive and nationalist. Wilson sacrificed his points for the League, then lost the League."],
        [163,7,"Red Scare & Palmer Raids (1919–1920)","A nationwide fear of communist and anarchist revolution after the Bolshevik Revolution (1917) and a series of anarchist bombings (including an attempt on Attorney General A. Mitchell Palmer's home). Palmer launched raids arresting over 6,000 suspected radicals, without warrants, and held them without charges. Hundreds were deported (including Emma Goldman). Civil liberties were flagrantly violated.","Fear of communism spreading to the U.S.; labor strikes (1919); immigrant radicalism.","Heightened anti‑immigrant sentiment; contributed to the 1924 immigration quotas. The raids were widely criticized by legal scholars and eventually discredited. The Red Scare faded by 1920.","Continuity – Fear of foreign radicals before (Alien and Sedition Acts, 1798). Change – The Palmer Raids were the most massive peacetime suppression of dissent in U.S. history (to that date). They set a precedent for the second Red Scare (McCarthyism, 1950s).","First Red Scare (1919‑20) vs. Second Red Scare (McCarthyism, 1950s). First targeted anarchists and immigrants; second targeted communists and government employees. First used mass arrests and deportations; second used investigations, blacklists, and hearings. Both suppressed civil liberties."],
        [164,7,"Espionage Act (1917) & Sedition Act (1918)","WWI laws: Espionage Act banned interfering with military operations, supporting enemies, or causing insubordination. Sedition Act (1918) extended to prohibit 'disloyal, profane, scurrilous, or abusive language' about the government, Constitution, or flag.","Anti‑war protests; government fear of sabotage and decreased enlistment.","Over 1,500 prosecuted (Eugene Debs sentenced to 10 years). Led to Schenck v. U.S. (1919) establishing 'clear and present danger' test. Provisions still exist.","Continuity – Wartime suppression of dissent (Alien and Sedition Acts 1798). Change – Acts were broader and used against socialists and labor leaders. Shift from targeting immigrants to targeting political speech.","WWI Sedition Act vs. Alien and Sedition Acts (1798). Both criminalized criticism of government; 1798 targeted Democratic‑Republicans; 1918 targeted socialists, anti‑war activists. Both passed during war/undeclared war."],
        [165,7,"Schenck v. United States (1919)","Supreme Court case: Charles Schenck (socialist) distributed anti‑draft leaflets. Convicted under Espionage Act. Court (unanimous) upheld conviction, establishing 'clear and present danger' test for free speech. Justice Holmes gave the example that falsely shouting 'fire' in a theater is not protected.","WWI draft resistance; government prosecution of anti‑war speech.","First time Court articulated limits on free speech. Later refined (Brandenburg v. Ohio 1969: 'imminent lawless action'). Schenck partly overruled, but 'clear and present danger' remains a framework.","Continuity – Courts continued balancing free speech and national security. Change – Schenck allowed speech restrictions, but later cases (Brandenburg) made it harder to punish inflammatory speech.","Schenck (1919) vs. Brandenburg (1969). Schenck allowed punishment for speech that poses 'clear and present danger'; Brandenburg protected speech unless it incites 'imminent lawless action.' Brandenburg more protective."],
        [166,7,"18th Amendment & Prohibition (1919)","The 18th Amendment (ratified Jan 1919) banned the manufacture, sale, and transportation of intoxicating liquors. The Volstead Act (Oct 1919) provided for enforcement. Prohibition began Jan 17, 1920. It was repealed by the 21st Amendment (Dec 1933).","Temperance movement (WCTU, Anti‑Saloon League); Protestant religious piety; anti‑immigrant sentiment (German and Irish beer culture); Progressive desire for social order.","Rise of organized crime (Al Capone, bootlegging); speakeasies; corruption of law enforcement; loss of tax revenue; increased lawlessness. The 'noble experiment' failed; public opinion turned against it. Repeal was the first (and only) time a constitutional amendment was repealed.","Continuity – Temperance activism since the 1820s. Change – Prohibition was a constitutional amendment (not just state law). Its failure led to repeal. It shifted the debate from moral reform to practical enforcement.","Prohibition vs. modern drug prohibition. Both criminalize a substance; alcohol prohibition was repealed after 13 years; drug prohibition continues (over 50 years). Both create black markets; alcohol prohibition had more visible popular opposition and was more quickly reversed."],
        [167,7,"19th Amendment (1920)","Guaranteed women the right to vote. The culmination of decades of activism, including Seneca Falls (1848), the National American Woman Suffrage Association (NAWSA), and more militant tactics of the National Woman's Party (Alice Paul). Ratified in August 1920.","Women's contributions to WWI (working in factories, nursing, Red Cross); decades of state victories (Wyoming (1869) and other western states); the enfranchisement of Black men (15th Amendment) created a precedent; the Progressive Era's democratic impulses.","Doubled the electorate. However, many Black women remained disenfranchised in the South (poll taxes, literacy tests, violence). The amendment did not change many other inequalities; the women's movement divided over the Equal Rights Amendment (ERA) later.","Continuity – Suffrage activism since 1848. Change – The 19th Amendment was the largest single expansion of voting rights in U.S. history. It shifted the movement from state‑by‑state to a nationwide constitutional right.","19th Amendment vs. 15th Amendment. 15th (1870) prohibited race‑based denial of vote; 19th prohibited sex‑based denial. Both had enforcement loopholes (poll taxes, literacy tests for women as well as Black men). The 19th was enforced more consistently than the 15th (though still imperfect)."],
        [168,7,"Emergency Quota Act (1921) & National Origins Act (1924)","Series of laws drastically limiting immigration. The 1921 Act set quotas at 3% of each nationality's population in the 1910 census. The 1924 Act lowered the quota to 2% of the 1890 census (to favor NW Europeans and reduce Southern/Eastern Europeans). It also virtually banned all Asian immigration (Japanese already excluded by 1907 'Gentlemen's Agreement'). Not until 1965 did the U.S. abolish national‑origin quotas.","Nativism; Red Scare; KKK resurgence (1920s Klan targeted immigrants); fears of job competition; eugenics movement.","Immigration from Eastern and Southern Europe dropped by 90%. The law reflected and reinforced racial hierarchies. It remained in force until the Immigration and Nationality Act of 1965.","Continuity – Chinese Exclusion Act (1882) already restricted one nationality. Change – The 1924 Act was the first comprehensive, all‑nationalities quota system. It shifted U.S. immigration policy from open door (except for Chinese) to highly restrictive.","National Origins Act (1924) vs. Immigration Act of 1965. 1924 used quotas based on 1890 census (favored NW Europe, excluded Asians). 1965 abolished quotas, established family reunification and skills preferences; led to a surge in Asian and Latin American immigration."],
        [169,7,"Sacco and Vanzetti (1927)","Two Italian‑born anarchists, Nicola Sacco and Bartolomeo Vanzetti, were convicted of murdering a paymaster and guard in South Braintree, Massachusetts (1920). The trial was riddled with bias: the judge, Webster Thayer, called them 'anarchist bastards.' Despite weak evidence and worldwide protests (including from Albert Einstein, George Bernard Shaw), they were executed in 1927. In 1977, Governor Michael Dukakis issued a proclamation that they had been unfairly tried.","Red Scare (anti‑immigrant, anti‑anarchist hysteria); the judge's bias; weak defense.","Became a cause célèbre for the left. Symbolized the injustice of the justice system toward immigrants and radicals. The case contributed to the decline of the Red Scare and to civil liberties reforms.","Continuity – Political trials existed before. Change – Sacco & Vanzetti sparked an international movement, unprecedented for a local murder case. It highlighted the role of prejudice in the legal system.","Sacco & Vanzetti vs. Dreyfus Affair (France, 1890s). Both miscarriages of justice based on anti‑Semitic (Dreyfus) and anti‑immigrant/anti‑anarchist prejudice. Both led to international protests and were eventually exonerated. Dreyfus was pardoned; Sacco and Vanzetti were executed."],
        [170,7,"Scopes Trial (1925)","The 'Monkey Trial.' John Scopes, a Tennessee high school teacher, was tried for teaching evolution (violating the Butler Act, which forbade teaching 'any theory that denies the story of the Divine creation of man as taught in the Bible'). The trial was a media circus: William Jennings Bryan (prosecution) and Clarence Darrow (defense). Scopes was convicted (the verdict was later overturned on a technicality). The trial pitted religious fundamentalism against modernism and science.","Fundamentalist reaction against Darwinism; a deliberate test case arranged by the ACLU to challenge the law.","Fundamentalism was ridiculed in the national press (H.L. Mencken). The trial hurt the anti‑evolution movement in the short term, but the Butler Act remained law until 1967. The trial highlighted the enduring tension between science and religion in American culture.","Continuity – Religious opposition to evolution continues (creationism, intelligent design). Change – The Scopes Trial was the first major media circus; it was broadcast on radio and covered nationally. It made the clash a national spectacle.","Scopes Trial vs. Edwards v. Aguillard (1987, Supreme Court). Scopes upheld the anti‑evolution law (later overturned on technicality); Edwards struck down a Louisiana law requiring creation science be taught alongside evolution, ruling that it violated the Establishment Clause. Both involved the same fundamental conflict; the Supreme Court eventually sided with science."],
        [171,7,"Marcus Garvey & UNIA (1914–1920s)","Jamaican‑born Black nationalist leader. Founded Universal Negro Improvement Association (UNIA). Advocated for Black separatism, economic self‑sufficiency, and 'Back to Africa' movement. Promoted Black Star Line steamship company.","Disillusionment with U.S. race relations; Great Migration; racism in 1910s; Garvey's vision of global Black unity.","Garvey's movement was the largest mass movement of Black people in U.S. history (millions of followers). Convicted of mail fraud (1925) and deported. His ideas influenced later Black nationalism (Malcolm X, Nation of Islam).","Continuity – Black nationalism before (Martin Delany, Henry Highland Garnet) and after (Malcolm X). Change – Garvey's movement was international (Pan‑Africanism) and economically focused (Black Star Line). Shift from integrationist NAACP to separatism.","Garvey vs. Du Bois. Initially rivals (Du Bois mocked Garvey; Garvey denounced Du Bois as 'mulatto elite'). Garvey: separatism, Africa; Du Bois: integration, legal equality. Later both embraced Pan‑Africanism."],
        [172,7,"Harlem Renaissance (1920s–1930s)","A flourishing of Black art, literature, music, and intellectualism centered in Harlem, New York City. Key figures: Langston Hughes (poetry), Zora Neale Hurston (novels, Their Eyes Were Watching God), Claude McKay (poetry), Louis Armstrong (jazz), Duke Ellington (jazz), Bessie Smith (blues), Paul Robeson (actor/singer). The movement celebrated Black identity and culture.","The Great Migration (Black population in Harlem swelled); patronage by white publishers and philanthropists; the Jazz Age; a desire to articulate a 'New Negro' identity (Alain Locke).","Increased the visibility and respect for Black culture among white Americans. Laid the groundwork for the Civil Rights Movement (a sense of Black pride and political consciousness). It also created tensions about the role of Black artists in representing race.","Continuity – Black arts existed before (spirituals, folk art). Change – The Harlem Renaissance was the first nationally recognized Black artistic movement. It gained mainstream attention, but the movement also faced criticism (e.g., from Langston Hughes himself) for being too dependent on white patronage.","Harlem Renaissance vs. Black Arts Movement (1960s‑70s). Harlem Renaissance focused on literature, music, and acceptance by white audiences; the Black Arts Movement was more militant, separatist, and politically radical. Both affirmed Black identity; the Black Arts Movement was more directly tied to Black Power."],
        [173,7,"Black Tuesday (October 29, 1929)","The day the stock market crashed. Panic selling set in; the Dow Jones Industrial Average fell 12% in one day, 25% over the whole week. Millions of shares were dumped with no buyers. It marked the beginning of the Great Depression (though some economists argue the Depression had already begun earlier).","Speculation ('buying on margin' – borrowing up to 90% of the purchase price); overproduction in industry and agriculture; weak banks; income inequality (80% of families had no savings). The stock market was a bubble.","Banks failed (9,000 closed by 1933); unemployment reached 25% by 1933; industrial production fell by half; farmers lost their land. Hoovervilles (shantytowns) appeared. The Great Depression was global.","Continuity – Economic panics occurred before (1873, 1893, 1907). Change – The Great Depression was the longest, deepest economic crisis in modern Western history. The stock market crash was the trigger, but not the sole cause; the Depression lasted until WWII.","Black Tuesday vs. Panic of 1873. Both started depressions; 1929 crash was sharper, and the Depression longer (10 years vs. 4‑5). The 1929 crash led to the New Deal (permanent changes); the 1873 panic led to labor unrest and the rise of the Greenback Party."],
        [174,7,"Smoot‑Hawley Tariff (1930)","The highest tariff in U.S. history (over 20,000 products). It was designed to protect American farmers and manufacturers from foreign competition. Instead, foreign nations retaliated with their own tariffs, and global trade collapsed (down 65%).","Protectionist sentiment; Hoover's desire to protect domestic jobs; the Republican Party's traditional pro‑tariff stance.","The tariff deepened the Great Depression by stifling international trade. It is now widely considered a policy mistake. It led to the Reciprocal Trade Agreements Act (1934), which authorized the president to negotiate tariff reductions, and ultimately to the General Agreement on Tariffs and Trade (GATT) and the World Trade Organization (WTO).","Continuity – High tariffs were common (McKinley 1890, Dingley 1897). Change – Smoot‑Hawley was the highest, and its disastrous effects led to a long‑term shift toward freer trade (though not immediately). It also led to the RTAA, delegating tariff policy to the executive branch.","Smoot‑Hawley Tariff vs. Reciprocal Trade Agreements Act (1934). Smoot‑Hawley raised tariffs; RTAA lowered them via executive negotiation. Smoot‑Hawley worsened the Depression; RTAA helped begin recovery (though WWII was the main recovery)."],
        [175,7,"Dust Bowl (1930s)","Severe drought and dust storms on the Great Plains (Texas, Oklahoma, Kansas, Colorado, New Mexico), caused by overplowing of native grasses (wheat boom in WWI) and the drought. Dust storms blackened skies, buried homes, and killed crops. The affected region became known as the Dust Bowl.","Overcultivation of marginal lands; removal of deep‑rooted grasses that held topsoil; a multi‑year drought (1931‑1939). Poor farming practices.","Many 'Okies' (including those from Oklahoma, Texas, etc.) migrated to California (depicted in John Steinbeck's The Grapes of Wrath). The federal government created the Soil Conservation Service (later NRCS) and promoted sustainable farming. The crisis raised awareness of environmental stewardship.","Continuity – Environmental disasters occur; the Dust Bowl was man‑made. Change – It led to the first major federal soil conservation programs. The Dust Bowl also changed the public's understanding of land management; before, drought was 'an act of nature'; after, poor farming practices were also blamed.","Dust Bowl vs. Hurricane Katrina (2005). Both natural (drought/hurricane) and human factors (poor farming/levee failures). Both caused mass displacement and a federal response. The Dust Bowl led to soil conservation; Katrina led to levee improvements and disaster preparedness reforms."],
        [176,7,"Bonus Army (1932)","About 17,000 WWI veterans (and their families) marched on Washington D.C. to demand early payment of a bonus due in 1945. They set up camps (including the 'Hooverville' near the Capitol). President Hoover ordered the army to evict them. General Douglas MacArthur (with aides Dwight Eisenhower and George Patton) used cavalry, tanks, and tear gas to clear the camps; veterans and their families were driven out, and their belongings were burned.","Great Depression desperation; veterans had little income; they needed the money now.","Hoover's image was destroyed; he looked cruel and out of touch. FDR was elected overwhelmingly later that year. FDR sent Eleanor Roosevelt to meet with the veterans and had them housed in a camp for the rest of the summer. The bonus was eventually paid in 1936 (over FDR's veto).","Continuity – Veterans' protests and government responses existed before. Change – The Bonus Army eviction was a public relations disaster for Hoover; it was the first time the army was used to suppress veterans. It directly contributed to the 1932 election result.","Bonus Army vs. Vietnam veteran protests (1960s‑70s). Both veterans protesting. Bonus Army sought economic relief; Vietnam vets protested the war and the government's treatment of veterans. Bonus Army was dispersed with force; Vietnam veterans were eventually treated with more sympathy (e.g., the Vietnam Veterans Memorial)."],
        [177,7,"New Deal (1933–1938)","FDR's comprehensive set of programs to provide Relief, Recovery, and Reform. Key agencies: FDIC (bank deposit insurance); SEC (securities regulation); CCC (jobs for young men in conservation); PWA/WPA (public works jobs); TVA (Tennessee Valley Authority – dams, electricity, flood control); AAA (farm subsidies; struck down initially, later continued); Social Security Act (1935) – old‑age pensions, unemployment insurance, aid to dependent children; Wagner Act (1935) – labor rights; Fair Labor Standards Act (1938) – minimum wage, 40‑hour week, child labor ban.","The Great Depression; Hoover's inadequacy (he believed in voluntary cooperation, not federal relief). FDR promised a 'New Deal' in his 1932 acceptance speech.","Created the modern American welfare state and regulatory state. The New Deal did not end the Depression (unemployment remained high until WWII). But it provided a safety net (Social Security), protected bank deposits (FDIC), regulated Wall Street (SEC), and established the principle of federal responsibility for economic welfare. The New Deal coalition (labor, minorities, white Southerners, farmers, urban voters) realigned politics, dominating until the 1960s.","Continuity – Federal aid existed before (Freedmen's Bureau, RFC). Change – The New Deal made federal aid permanent, not temporary. It created entitlement programs (Social Security) and regulatory agencies that still exist. It shifted the role of the federal government from limited to active.","New Deal vs. Great Society (1960s). New Deal focused on economic security (jobs, social insurance, banking regulation). Great Society focused on civil rights, poverty (War on Poverty), health care (Medicare, Medicaid), and education (Head Start, Elementary and Secondary Education Act). Both expanded federal power; the New Deal laid the foundation."],
        [178,7,"Social Security Act (1935)","Created a system of old‑age pensions (funded by payroll tax), unemployment insurance (run by states), and aid to dependent children (welfare). It was the first federal social insurance program.","Elderly poverty was severe; unemployment was high; state programs were inadequate. FDR wanted a permanent solution.","Provided a floor for retired workers. Excluded agricultural and domestic workers (mostly Black) until the 1950s. Still exists as the largest government program. It dramatically reduced elderly poverty.","Continuity – State‑level old‑age pensions existed before (some). Change – Social Security is national, compulsory, and universal (though exclusions initially). Shift from charity to entitlement.","Social Security vs. European welfare states (e.g., Bismarck's Germany, Britain's post‑WWII). U.S. later, less generous, and excluded many initially. Europe had universal health care; the U.S. only old‑age and unemployment."],
        [179,7,"Wagner Act (National Labor Relations Act) – 1935","Guaranteed workers the right to organize unions, bargain collectively, and strike. Created the National Labor Relations Board (NLRB) to oversee union elections and prevent unfair labor practices (e.g., firing workers for union activity). It was the 'Magna Carta of labor.'","Employers had used violent repression, blacklists, and court injunctions (Sherman Act) to crush unions. FDR and the New Deal wanted to balance power.","Union membership exploded (3 million in 1933 → 9 million by 1940). The Wagner Act enabled the rise of industrial unions (CIO – Congress of Industrial Organizations). It was later modified by the Taft‑Hartley Act (1947) to restrict some union practices, but the core protections remain.","Continuity – State labor laws existed. Change – The Wagner Act was the first federal law guaranteeing workers the right to unionize with enforcement mechanisms. It reversed decades of pro‑employer legal bias.","Wagner Act vs. Clayton Act (1914). Clayton exempted unions from antitrust (a step forward). Wagner Act gave positive rights (to organize and bargain) and created an enforcement agency (NLRB). Clayton was defensive; Wagner was affirmative."],
        [180,7,"Fair Labor Standards Act (1938)","Established the first federal minimum wage (25¢/hour, later raised), a maximum workweek (44 hours, later 40), and banned oppressive child labor (under 14 no; 14‑16 limited). It applied to workers engaged in interstate commerce.","Persistence of low wages, long hours, and child labor despite earlier attempts (Keating‑Owen). The New Deal sought to raise labor standards.","Created the modern wage‑and‑hour framework. It was upheld by the Supreme Court (United States v. Darby Lumber, 1941) – the Court had reversed its earlier hostility to New Deal laws. The FLSA still sets minimum wage and overtime rules.","Continuity – State laws existed (weak). Change – FLSA was the first permanent, nationwide wage and hour law. It survived constitutional challenges because the Court had changed after FDR's Court‑packing threat.","FLSA vs. Keating‑Owen Act (1916). Both banned child labor; Keating‑Owen was struck down as beyond commerce power; FLSA was upheld – reflecting a changed Court and a broader interpretation of commerce clause."],
