        [181,7,"Neutrality Acts (1935–1937)","A series of laws designed to keep the U.S. out of foreign wars: (1) mandatory arms embargo against all belligerents; (2) banned loans and credits to belligerents; (3) banned U.S. citizens from traveling on belligerent ships; (4) allowed only cash‑and‑carry trade of non‑military goods. The goal was to avoid the mistakes that led to WWI.","Isolationist sentiment after WWI; the Nye Committee (1934‑36) heard testimony that arms makers ('merchants of death') had pushed the U.S. into WWI.","The Acts prevented FDR from aiding allies as Germany, Italy, and Japan became aggressive. They were gradually relaxed (cash‑and‑carry for arms, 1939; Lend‑Lease, 1941). The Acts delayed but could not stop U.S. involvement.","Continuity – Isolationism had deep roots (Washington's Farewell Address). Change – The Neutrality Acts were binding legislation, not just presidential policy. Before, presidents had discretion; now, they were constrained by law.","Neutrality Acts vs. Wilson's neutrality (1914‑17). Wilson had discretion to choose sides (eventually aiding Allies). FDR was tied by the Neutrality Acts, but he found ways around them (cash‑and‑carry, Lend‑Lease). Both eventually led to war."],
        [182,7,"Court Packing Plan (1937)","FDR proposed adding one justice for every sitting justice over age 70 (up to 6 additional justices). He claimed it was to relieve the workload, but the real motive was to get the Supreme Court to stop striking down New Deal laws (the Court had killed NRA, AAA, and other programs). The plan was strongly opposed and failed in Congress (however, after FDR's threat, the Court began upholding New Deal laws – the 'switch in time that saved nine').","FDR's frustration with a conservative Court that was blocking his agenda.","Damaged FDR's political capital; gave Republicans a powerful issue. But the Court did change its stance (justices Roberts and Hughes began voting with the liberals). The episode showed the limits of presidential power and the importance of judicial independence.","Continuity – Presidents had tried to influence the Court before (Adams' midnight judges). Change – FDR's proposal was seen as a direct threat to judicial independence. It failed, and the Court changed anyway, partly because FDR got to appoint new justices through retirements.","Court Packing Plan vs. Lincoln's Court changes. Lincoln added a 10th justice in 1863 to ensure his policies were upheld (it worked). Lincoln's addition was constitutional (Congress can set the number). FDR's plan also would have been constitutional, but he lost the political battle."],
        [183,7,"Lend‑Lease Act (March 1941)","Allowed the U.S. to transfer (sell, lend, lease) weapons, ships, and supplies to any nation whose defense the president deemed vital to U.S. security. Essentially, the U.S. could provision Britain (and later the Soviet Union) without requiring cash. The phrase 'arsenal of democracy' (FDR speech) captured the idea.","Britain had run out of cash; the Neutrality Acts prevented loans; FDR wanted to support the Allies without formally entering the war.","Ended U.S. neutrality in all but name. German U‑boats responded by attacking U.S. ships (undeclared naval war). The Act was a crucial factor in the Allied defeat of Nazi Germany.","Continuity – The U.S. had aided Allies before (cash‑and‑carry). Change – Lend‑Lease gave supplies without immediate payment; it was a virtual declaration of economic war. It marked the final abandonment of neutrality.","Lend‑Lease vs. WWI loans to Allies. In WWI, the U.S. lent money to Allies (and later entered the war). In WWII, Lend‑Lease gave supplies directly, without repayment expected. Both favored the Allies; Lend‑Lease was more generous and direct."],
        [184,7,"Pearl Harbor (December 7, 1941)","The Japanese attack on the U.S. naval base at Pearl Harbor, Hawaii. Approximately 2,400 Americans killed; 8 battleships damaged/sunk; 300+ aircraft destroyed. The attack was a surprise; the U.S. and Japan were still negotiating. FDR called it 'a date which will live in infamy.' The U.S. declared war on Japan on December 8. Germany and Italy declared war on the U.S. on December 11.","U.S. embargoes on Japan (oil, steel) in response to Japan's invasion of China; Japan saw war as the only way to secure resources in Southeast Asia.","The U.S. entered WWII. American public opinion, which had been isolationist, now overwhelmingly supported war. The war mobilized the economy, ended the Great Depression, and transformed the U.S. into a superpower.","Continuity – Surprise attacks preceded (Lusitania, but that was on a ship). Change – Pearl Harbor was on U.S. territory (Hawaii was a territory). It was the most devastating attack on the U.S. until 9/11. It permanently ended isolationism.","Pearl Harbor vs. 9/11 (2001). Both surprise attacks on U.S. soil; Pearl Harbor by a foreign state's military; 9/11 by terrorists. Both led to wars (WWII in Pacific; War on Terror). Pearl Harbor had a formal declaration of war; 9/11 led to an Authorization for Use of Military Force."],
        [185,7,"Executive Order 8802 & Fair Employment Practices Committee (1941)","Issued by FDR in June 1941, in response to A. Philip Randolph's planned March on Washington (scheduled for July 1, 1941, with 100,000 expected). The order banned racial discrimination in defense industries and government training programs, and created the Fair Employment Practices Committee (FEPC) to investigate complaints.","Black workers were barred from high‑paying defense jobs; the March on Washington movement threatened to embarrass FDR on the eve of war.","The first federal civil rights action since Reconstruction. Over 2 million Black workers entered defense industry jobs. The FEPC had limited enforcement power but set a precedent for future civil rights legislation.","Continuity – Black activism existed (NAACP, Double V Campaign). Change – EO 8802 was the first time since 1875 (Civil Rights Act) that a president used executive order to combat racial discrimination. It was a major step toward the Civil Rights Movement.","EO 8802 vs. Civil Rights Act of 1964. EO 8802 only covered defense contracts; CRA 1964 covered all employment and public accommodations. EO 8802 had weak enforcement; CRA 1964 had a strong EEOC. EO 8802 was a wartime measure; CRA 1964 was permanent."],
        [186,7,"Japanese Internment (Executive Order 9066, 1942)","FDR's order authorized the forced removal and incarceration of about 110,000 Japanese Americans (two‑thirds U.S. citizens) from the West Coast. They were sent to remote inland camps, losing their homes, businesses, and property. The government claimed military necessity (fear of espionage and sabotage), but no evidence of disloyalty existed. The Supreme Court upheld the action in Korematsu v. U.S. (1944). In 1988, the U.S. government apologized and paid reparations ($20,000 to each surviving internee).","Pearl Harbor; racial prejudice (especially on the West Coast); political pressure; the absence of similar action against German or Italian Americans (shows racism).","Loss of civil liberties and economic ruin for Japanese Americans. The Supreme Court later repudiated Korematsu (2018 dictum). Internment is now widely condemned as a grave injustice.","Continuity – Wartime hysteria has targeted groups before (German Americans in WWI). Change – Japanese internment was based solely on race; it was the largest mass removal of a group in U.S. history. Unlike the earlier German internment, Japanese Americans were mostly citizens.","Japanese Internment vs. German American internment in WWI. In WWI, about 4,000 Germans and other non‑citizens were interned, but citizens were not. In WWII, over 110,000 Japanese (2/3 citizens) were interned. The scale and racism differentiated Japanese internment."],
        [187,7,"Double V Campaign (1942–1945)","A campaign launched by the African American press (especially the Pittsburgh Courier) calling for 'Victory abroad over fascism and Victory at home over racism.' It linked the war against Hitler with the fight against Jim Crow. It boosted morale and activism.","Segregation in the military; discrimination in defense jobs; the hypocrisy of fighting for democracy abroad while denying it at home.","Inspired Black military enlistment (the Tuskegee Airmen, 92nd Infantry Division). Helped build momentum for the civil rights movement after the war. It also influenced the Double V (or 'Double Victory') sentiment that led to the GI Bill's uneven application and the post‑war push for equality.","Continuity – Black activism existed (NAACP, Universal Negro Improvement Association). Change – The Double V Campaign explicitly linked foreign and domestic struggles. It was a mass movement, using media to reach a wide audience.","Double V Campaign vs. the Black Power movement (1960s). Double V sought victory over fascism abroad while demanding civil rights at home; Black Power was more separatist, militant, and focused on self‑determination. Both affirmed Black identity and demanded change."],
        [188,7,"Rosie the Riveter (WWII, 1942–1945)","A cultural icon representing women who worked in factories and shipyards during the war. By 1944, women made up one‑third of the civilian labor force. The most famous image is Norman Rockwell's 'Rosie the Riveter' (1943). Women produced planes, tanks, ships, and munitions.","Men went to war; labor shortage; the need for wartime production. Government propaganda encouraged women to work.","Women gained economic independence and skills. After the war, many women were laid off and pressured to return to domestic roles. However, the experience changed societal expectations and helped fuel the feminist movement of the 1960s‑70s.","Continuity – Women had worked outside the home before (Lowell Mills, domestic service). Change – WWII brought married women, older women, and formerly excluded groups into industrial jobs. The scale and visibility were unprecedented.","Rosie the Riveter vs. the New Woman of the 1920s. The 1920s flapper symbolized social liberation (dancing, short hair, smoking). Rosie symbolized economic contribution and national duty. Both expanded women's roles, but Rosie's gains were temporary, while the flapper's cultural shift lasted."],
        [189,7,"D‑Day (June 6, 1944)","Operation Overlord – the Allied invasion of Normandy, France. The largest amphibious invasion in history. Over 150,000 soldiers (American, British, Canadian) landed on five beaches (Utah, Omaha, Gold, Juno, Sword). The Germans were dug in; casualties were heavy (over 4,000 Allied dead, 6,000 wounded, mostly on Omaha Beach). But the invasion succeeded, establishing a Western Front.","The need to liberate Europe from Nazi control; the Tehran Conference (1943) agreement.","Led to the liberation of Paris (August 25, 1944) and the eventual defeat of Germany (May 1945). D‑Day was the turning point in the European theater; after it, the Allies advanced inexorably.","Continuity – Amphibious assaults had occurred before (North Africa, Sicily, Salerno). Change – D‑Day was the largest and most crucial. It marked the shift from stalemate to liberation.","D‑Day vs. the Invasion of North Africa (Operation Torch, 1942). North Africa was smaller in scale, had less German resistance, and was a learning experience. D‑Day was the decisive blow."],
        [190,7,"Atomic Bombs (Hiroshima & Nagasaki – August 6 & 9, 1945)","The U.S. dropped two atomic bombs: 'Little Boy' (uranium) on Hiroshima (Aug 6), about 140,000 dead by the end of 1945; 'Fat Man' (plutonium) on Nagasaki (Aug 9), about 74,000 dead. Japan surrendered on August 15 (VJ Day), ending WWII.","Japan refused to surrender unconditionally; the U.S. feared a costly invasion of Japan (estimated 500,000 to 1 million U.S. casualties); the U.S. wanted to demonstrate the bomb to the Soviet Union, showing its power.","Immediate surrender of Japan. Start of the nuclear age and the Cold War arms race. The morality of the bombings remains debated. The U.S. occupied Japan, leading to its post‑war democratic transformation.","Continuity – Strategic bombing had been used (firebombing of Tokyo, March 1945, killed ~100,000). Change – The atomic bombs destroyed cities with a single weapon, had radiation effects, and ended the war without an invasion. They changed warfare fundamentally.","Atomic bombs vs. firebombing of Dresden/Tokyo. Conventional firebombing killed more (Tokyo: 100,000; Dresden: 25,000‑35,000). Atomic bombs killed fewer (combined ~214,000) but had long‑term radiation sickness, and the psychological impact was far greater. The atomic bomb ended the war."],
        [191,7,"United Nations Founded (1945)","The UN was established in San Francisco on April 25, 1945, with 50 nations signing the Charter. The U.S. became a permanent member of the Security Council (with veto power). The UN replaced the defunct League of Nations.","Failure of the League; WWII devastation; desire for permanent collective security.","The U.S. departed from isolationism and embraced leadership of the post‑war world. The UN provided a forum for Cold War diplomacy, peacekeeping, and later human rights initiatives. The U.S. contributed troops, dues, and political capital.","Continuity – International organizations existed (League of Nations). Change – The U.S. joined the UN (unlike the League). The UN had more enforcement power (Security Council veto) and broader membership.","UN (1945) vs. League of Nations (1919). The U.S. joined the UN but never joined the League. The League required unanimity; the UN Security Council has veto power (U.S. permanent). The UN has been more active in peacekeeping and humanitarian efforts."]
    [192,8,"22nd Amendment (1951)","Limited presidents to two terms – a symbolic repudiation of FDR’s four terms. Passed by Republican Congress after 1946 midterms.","Conservatives feared executive power after FDR’s long presidency.","Established two‑term limit still in effect.","Continuity – Two‑term precedent had been set by Washington; now a constitutional amendment.","22nd Amendment vs. Washington’s precedent – Washington declined voluntarily; 22nd made it mandatory."],
        [193,8,"Taft‑Hartley Act (1947)","Passed over Truman’s veto. Outlawed closed shop, banned secondary boycotts, prohibited union dues for politics, required anti‑communist oaths for union officials.","Conservative backlash against union power under Wagner Act (1935); fear of Communist influence.","Gutted union power; workers hated it.","Continuity – Federal regulation of labor continued; shifted from pro‑union (Wagner) to anti‑union.","Taft‑Hartley vs. Wagner Act – Wagner gave organizing rights; Taft‑Hartley restricted them."],
        [194,8,"Truman’s Fair Deal (1949)","Domestic agenda: expand Social Security, raise minimum wage, national health insurance, federal education aid, civil rights. Almost entirely blocked by Southern Democrats and Republicans.","Truman’s upset 1948 victory; desire to extend New Deal.","Only minimum wage raise passed (40¢ to 75¢).","Continuity – Idea of a 'deal' (New Deal, Fair Deal) continued; Fair Deal failed where New Deal succeeded.","Fair Deal vs. New Deal – New Deal passed during depression; Fair Deal stalled in prosperous but conservative era."],
        [195,8,"Executive Order 9981 (1948)","Truman desegregated the U.S. military. A. Philip Randolph pressured him. First fully integrated war was Korea.","Committee on Civil Rights report; Randolph’s threat of mass protest.","Military became a model of integration; paved way for civil rights movement.","Continuity – Military had been segregated since WWI. First major federal desegregation since Reconstruction.","EO 9981 vs. Brown v. Board – Both desegregation milestones; military integration happened earlier with less resistance."],
        [196,8,"Bretton Woods Conference (1944)","Created IMF and World Bank to stabilize global economy after WWII. Soviets rejected them as capitalist tools.","Need to prevent another depression; U.S. wanted free‑market global economy.","IMF and World Bank still operate; U.S. dollar as global currency.","Continuity – International economic cooperation existed (gold standard); now U.S.‑led.","Bretton Woods vs. Treaty of Versailles – Bretton Woods aimed to rebuild; Versailles punished Germany."],
        [197,8,"Churchill’s 'Iron Curtain' Speech (March 1946)","In Fulton, Missouri, Churchill described the divide between free Western Europe and communist dictatorships of Eastern Europe.","Soviet refusal to hold free elections in Eastern Europe (promised at Yalta).","Publicly framed the Cold War as a struggle between freedom and tyranny.","Continuity – Warnings existed earlier (Kennan’s Long Telegram). First public, dramatic declaration of the Cold War divide.","Iron Curtain speech vs. Truman Doctrine – Speech described problem; Truman Doctrine provided solution (containment)."],
        [198,8,"George Kennan’s Long Telegram & Containment","Kennan argued the Soviet Union was expansionist but cautious; U.S. should contain communism where it existed and prevent spread. Became basis of Truman Doctrine.","Soviet actions in Eastern Europe; failure of post‑WWII cooperation.","Containment guided U.S. Cold War policy for decades (Truman Doctrine, NATO, Vietnam).","Continuity – Shift from isolationism to active global intervention to block communism.","Containment vs. Rollback – Containment aimed to stop spread; rollback sought to push communism back (Reagan Doctrine)."],
        [199,8,"Truman Doctrine (March 1947)","First application of containment – $400 million military/economic aid to Greece and Turkey to prevent communist takeovers.","Fear that without aid, both nations would fall to communism; domino theory.","Set precedent for U.S. intervention to support anti‑communist regimes worldwide.","Continuity – U.S. had aided allies before (Lend‑Lease). Now explicitly anti‑communist.","Truman Doctrine vs. Monroe Doctrine – Both asserted spheres of influence; Monroe kept Europe out of Americas; Truman intervened to stop communism."],
        [200,8,"Marshall Plan (1947–1952)","Over $12 billion to rebuild Western Europe and prevent communist expansion. Soviets rejected it.","Economic devastation in Europe; fear that poverty would lead to communism.","Western Europe recovered rapidly; communist parties lost influence. A massive success.","Continuity – Post‑war aid existed (UNRRA). Unprecedented scale; tied to containment.","Marshall Plan vs. Morgenthau Plan – Morgenthau wanted to de‑industrialize Germany; Marshall Plan rebuilt it."],
        [201,8,"Berlin Airlift (June 1948 – May 12, 1949)","Soviets blockaded West Berlin (100 miles inside Soviet sector). U.S. and Britain flew supplies for nearly a year. Cost $224 million.","Western allies introduced Deutsche Mark; Soviets saw it as a threat.","Blockade ended; NATO formed soon after. Demonstrated U.S. commitment to Western Europe.","Continuity – First use of airlift to overcome a ground blockade, avoiding war.","Berlin Airlift vs. Cuban Missile Crisis – Both high‑tension; airlift resolved by patience; missile crisis by negotiation and secrecy."],
        [202,8,"NATO (1949) & Warsaw Pact (1955)","NATO – U.S., UK, France, Canada, and eight others agreed attack on one is attack on all. Warsaw Pact – Soviet response, mutual defense of eight communist nations.","Berlin blockade; fear of Soviet expansion.","Formalized two Cold War camps. Warsaw Pact dissolved 1991 with USSR.","Continuity – First peacetime military alliance the U.S. ever joined.","NATO vs. League of Nations – NATO is military alliance; League was collective security without armed forces."],
        [203,8,"NSC‑68 (1950)","Top‑secret report calling for massive military buildup – up to 20% of GNP on defense. Army grew to 3.6 million; defense budget quadrupled to $52 billion.","Soviet atomic bomb (1949); fall of China to Mao (1949); fear of communist expansion.","Militarized the Cold War; created permanent national security state.","Continuity – U.S. had expanded military during wars. NSC‑68 made high military spending permanent even in peacetime.","NSC‑68 vs. Truman Doctrine – Truman Doctrine applied to specific countries; NSC‑68 made containment global, expensive, military‑first."],
        [204,8,"Mutually Assured Destruction (MAD)","Both superpowers stockpiled nuclear weapons knowing using them would destroy both nations. That paradox kept the Cold War 'cold.'","Development of hydrogen bombs; delivery systems (ICBMs).","No direct superpower war. Arms race drove spending.","Continuity – Nuclear weapons made deterrence absolute; any use could end civilization.","MAD vs. Conventional Deterrence – Conventional wars could be limited; nuclear war under MAD is all or nothing."],
        [205,8,"Covert CIA Operations – Iran (1953, Operation Ajax)","CIA overthrew Prime Minister Mossadegh, who had nationalized British oil. U.S. installed the Shah and secured 40% oil concessions.","Protect Western oil interests; fear of communism.","Shah ruled for 25 years; deep anti‑American resentment led to 1979 revolution.","Continuity – First major CIA‑led coup in the Middle East.","Iran (1953) vs. Guatemala (1954) – Both CIA coups for business interests; Iran’s blowback lasted longer."],
        [206,8,"Covert CIA Operations – Guatemala (1954)","CIA overthrew President Arbenz, who pursued land reform threatening United Fruit Company holdings.","Corporate interests; fear of communism (Arbenz accepted arms from Czechoslovakia).","Arbenz fell; triggered decades of civil war; U.S. reputation damaged.","Continuity – U.S. had used military force in Latin America (Banana Wars). Now used CIA.","Guatemala vs. Iran – Both covert; Guatemala more about corporate interests; Iran about oil."],
        [207,8,"Eisenhower’s 'Hidden Hand' Presidency","Appeared passive while quietly directing policy behind the scenes. Laissez‑faire but expanded Social Security, raised minimum wage, created HEW, supported National Defense Education Act.","Military background; desire to seem above politics.","Prosperous 1950s; massive government subsidies (GI Bill, FHA, Interstate Highway) despite free‑market rhetoric.","Continuity – Presidents always worked behind scenes; Eisenhower unusually successful.","Eisenhower vs. Reagan – Both spoke of limited government but expanded it."],
        [208,8,"Eisenhower’s 'New Look' Defense (Massive Retaliation)","Emphasized nuclear weapons over large conventional forces as cheaper containment.","Budget concerns; desire to deter Soviet attack.","Reliance on nukes; brinkmanship. Kennedy replaced with 'flexible response.'","Continuity – U.S. had used atomic threats before. Made nuclear warfare central.","Massive Retaliation vs. Flexible Response – Massive retaliation threatened all‑out nuclear war; flexible response offered conventional options."],
        [209,8,"Military‑Industrial Complex (Eisenhower’s Farewell Address, 1961)","Warning about dangerous alliance between military establishment and defense industry. Annual military spending exceeded net income of all U.S. corporations combined.","Cold War arms race; NSC‑68 buildup.","Predicted endless military buildup. Still a central critique.","Continuity – Warnings about war profiteering existed earlier. Eisenhower first named it.","Eisenhower’s warning vs. Modern critiques – Same concern; today includes private contractors."],
        [210,8,"McCarthyism & the Red Scare","Senator McCarthy claimed (no evidence) list of 205 Communists in government. 'McCarthyism' means accusing without real proof. Led HUAC investigations targeting Hollywood, labor, military.","Post‑WWII fear of communism; Soviet espionage; political opportunism.","Blacklists, ruined careers, destroyed civil liberties. Lost credibility during Army‑McCarthy hearings (1954).","Continuity – Earlier red scares (1919‑20). McCarthyism used televised hearings to spread fear.","McCarthyism vs. Palmer Raids – Both suppressed dissent; Palmer arrested thousands; McCarthy used hearings and blacklists."],
        [211,8,"HUAC & Hollywood Ten","House Un‑American Activities Committee investigated communist influence in Hollywood. 'Unfriendly witnesses' blacklisted – unable to work in film.","Fear that films contained communist propaganda.","Hundreds blacklisted; careers destroyed; culture of fear.","Continuity – Blacklisting existed in other industries. Hollywood blacklist became a symbol.","Hollywood Ten vs. Smith Act prosecutions – Both targeted communists; Ten were blacklisted; Smith Act led to jail."],
        [212,8,"Margaret Chase Smith’s Declaration of Conscience (June 1, 1950)","Senator Smith argued Americans have right to hold unpopular beliefs without being labeled Communists; Senate had become platform for irresponsible sensationalism.","McCarthy’s reckless accusations; fear that Red Scare was being abused.","One of first public challenges to McCarthyism.","Continuity – Earlier critics of hysteria (Brandeis). First senator to openly denounce McCarthy on floor.","Smith vs. Murrow – Both opposed McCarthy; Murrow used television; Smith used Senate floor."],
        [213,8,"Anti‑Communist Media & Culture","TV shows, films, sci‑fi (aliens as communist metaphors), comics, novels spread fear. Cincinnati Reds renamed 'Redlegs.' American Legion staged mock communist takeover in Mosinee, Wisconsin.","Government and industry promotion; genuine fear.","Normalized anti‑communist hysteria; shaped public opinion.","Continuity – Propaganda in past wars. Peacetime propaganda targeting ideology.","1950s anti‑communist media vs. WWI anti‑German propaganda – Communism was an ideology, not a nationality."],
        [214,8,"Korean War (1950–1953)","Korea divided at 38th parallel after WWII. North Korea invaded South June 25, 1950. UN (88% U.S.) under MacArthur recaptured Seoul, pushed north. China intervened; MacArthur wanted to bomb China; Truman fired him. Armistice left Korea divided with DMZ. 33,629 Americans killed.","Cold War rivalry; Soviet support for North Korea.","Strengthened presidential war powers (no declaration). Deepened Cold War mentality. Set stage for Vietnam.","Continuity – First 'police action' under UN auspices.","Korean War vs. Vietnam War – Both limited wars; Korea ended in stalemate; Vietnam ended in U.S. withdrawal."],
        [215,8,"Cuban Revolution & Bay of Pigs (1959–1961)","Castro’s revolution created communist nation 90 miles from Florida. U.S.‑backed Bay of Pigs invasion (April 1961) failed badly.","Castro seized U.S. property; U.S. hostility to communism.","Cuba turned to USSR for protection; led to missile crisis.","Continuity – U.S. had tried to overthrow Latin American governments before. Bay of Pigs humiliation pushed Cuba closer to Soviets.","Bay of Pigs vs. Iran (1953) – Both attempted regime change; Bay of Pigs failed because it used exiles."],
        [216,8,"Cuban Missile Crisis (October 1962)","Soviets placed nuclear missiles in Cuba; discovered Oct 15. Kennedy chose naval 'quarantine' (not blockade). On Oct 27 a U.S. depth charge forced a Soviet sub to surface; only Vasili Arkhipov refused to launch a nuclear torpedo. Resolution: U.S. remove missiles from Turkey and promise not to invade Cuba; Soviets remove Cuban missiles.","Failed Bay of Pigs; U.S. missiles in Turkey.","Closest world came to nuclear war; led to hotline and arms control.","Continuity – First time DEFCON 2 reached (one step from war).","Cuban Missile Crisis vs. Berlin Airlift – Both U.S.‑Soviet confrontations; airlift resolved by patience; missile crisis by back‑channel deal."],
        [217,8,"Vietnam War – Gulf of Tonkin Resolution (1964)","LBJ got a blank check for military escalation after reported North Vietnamese attack on U.S. ships. The second attack never happened (NSA later admitted). Johnson announced only two Marine battalions, but six weeks later 50,000 combat troops were in Vietnam.","Containment, Domino Theory; fear of another 'loss.'","Massive escalation; credibility gap grew.","Continuity – U.S. had used false pretenses to enter wars (Maine). The lie was exposed, damaging trust.","Gulf of Tonkin vs. Pearl Harbor – Both used to justify war; Tonkin involved deception; Pearl Harbor was real."],
        [218,8,"Vietnam – U.S. Strategy & Credibility Gap","Attrition strategy – heavy artillery, air power, search‑and‑destroy missions. Agent Orange used. By 1968, 3M tons of bombs dropped; weekly U.S. deaths rose from 26 to 180. CBS showed Marines burning civilian homes – credibility gap born.","Inability to win conventional victory; military frustration.","Public trust eroded; anti‑war movement grew.","Continuity – First time TV showed graphic, uncensored war footage contradicting official statements.","Vietnam credibility gap vs. WWII censorship – WWII news was heavily censored; Vietnam allowed unprecedented access."],
        [219,8,"Tet Offensive (January 30, 1968)","85,000 North Vietnamese and Vietcong attacked 100+ cities during Vietnamese New Year. U.S. lost 4,000; North lost 40,000+. Military defeat for North but shattered U.S. confidence – 49% called war a mistake.","North Vietnamese desire to break stalemate; crush South Vietnamese morale.","LBJ’s approval hit all‑time low; he announced he would not seek reelection. Turning point.","Continuity – Surprise attacks had turned wars before (Pearl Harbor). Tet was military loss for North but propaganda victory.","Tet vs. D‑Day – Both large offensives; D‑Day led to victory; Tet led to U.S. withdrawal."],
        [220,8,"My Lai Massacre (March 16, 1968)","U.S. soldiers killed 300–500 unarmed Vietnamese civilians, mostly women, children, elderly. Lt. William Calley ordered killings. Soldier Ron Ridenhour’s letter led to investigation.","Frustration, poor leadership, dehumanization of enemy.","Devastated American trust in military; deepened anti‑war movement.","Continuity – Wartime atrocities occurred before. My Lai covered up, then exposed, shocking the nation.","My Lai vs. Abu Ghraib – Both atrocities exposed by soldiers’ testimony; My Lai involved massacre; Abu Ghraib involved torture."],
        [221,8,"Student Anti‑War Movement & Kent State (1970)","SDS (Port Huron Statement, 1962) stressed participatory democracy. Teach‑ins spread. Central Park rally (1967) drew 300,000. Draft resistance; Muhammad Ali refused. Kent State (May 4, 1970): National Guard killed four students protesting Cambodia invasion. 100,000 marched on White House. Jackson State (May 14): police killed two Black students.","Draft injustice (college deferments); perception of immoral war.","26th Amendment lowered voting age to 18. Increased pressure to end draft.","Continuity – Student protests existed earlier (Berkeley). Kent State radicalized a generation.","Kent State vs. Jackson State – Kent State white students; Jackson State Black students; both unarmed."],
        [222,8,"Vietnamization & End of War (1973–1975)","Nixon Doctrine (Vietnamization) – shift fighting to South Vietnamese while withdrawing U.S. troops. Secretly bombed Cambodia. Paris Accords (1973) – ceasefire and withdrawal. Saigon fell April 1975.","Public pressure; inability to win; cost.","First war the U.S. definitively lost. 58,000 Americans killed; 3–4 million Vietnamese dead. Destroyed trust in government.","Continuity – U.S. had withdrawn from wars before (after WWI). This was the first U.S. defeat.","Vietnamization vs. Korean War stalemate – Both ended with U.S. withdrawal; Korea remained divided; Vietnam became communist."],
        [223,8,"War Powers Act (1973)","Requires president to notify Congress within 48 hours of troop deployment; limits commitment to 60 days without congressional approval.","Abuse of presidential war powers (Gulf of Tonkin, secret bombing).","Restored congressional checks; overturned Gulf of Tonkin Resolution.","Continuity – Congressional checks on war exist in Constitution. First explicit statutory limit.","War Powers Act vs. Constitution – Constitution gives Congress power to declare war; Act gives Congress power to cut off funds after 60 days."],
        [224,8,"26th Amendment (1971)","Lowered voting age to 18.","Argument that if 18‑year‑olds could be drafted to die, they should be able to vote.","Expanded electorate by millions.","Continuity – Voting age had been lowered before (15th, 19th Amendments). Response to a specific war.","26th vs. 19th Amendment – Both expanded suffrage; 19th fought for decades; 26th passed quickly due to Vietnam."],
        [225,8,"Space Race – Sputnik to Moon Landing","Sputnik 1 launched Oct 4, 1957 – first satellite. NASA created (1958). National Defense Education Act passed. Yuri Gagarin first human in orbit (April 1961). Alan Shepard first American (May 1961). Kennedy: 'Land a man on the moon before the decade is out.' Apollo 1 fire killed three astronauts (1967). Neil Armstrong walked on moon July 20, 1969.","Cold War competition; fear of Soviet technological superiority.","Boosted American morale; inspired science education.","Continuity – Moon landing was first human visit to another celestial body.","Space Race vs. Arms Race – Both Cold War competitions; arms race threatened survival; space race inspired achievement."],
        [226,8,"Brown v. Board of Education (1954)","Thurgood Marshall argued separate schools created badge of inferiority. Chief Justice Earl Warren unanimous ruling: separate schools inherently unequal, overturning Plessy v. Ferguson (1896). Ordered desegregation 'with all deliberate speed.'","NAACP legal strategy; social science evidence.","Sparked massive resistance; led to federal intervention (Little Rock). Paved way for civil rights movement.","Continuity – Courts had chipped at Plessy (Gaines v. Canada). Brown directly overturned separate but equal.","Brown vs. Plessy – Plessy upheld segregation; Brown declared it unconstitutional."],
        [227,8,"Massive Resistance & Southern Manifesto (1956)","Senator Harry Byrd (VA) led 'massive resistance' – closing public schools rather than desegregating. Prince Edward County closed schools 1959–64. Southern Manifesto signed by 96 members of Congress, arguing Court overstepped its authority.","White backlash to Brown.","Delayed desegregation for years; white private 'segregation academies' founded.","Continuity – Resistance to federal court orders existed; Southern Manifesto was a formal defiance.","Massive Resistance vs. Nullification Crisis – Both claimed states’ rights; nullification over tariff; resistance over race."],
        [228,8,"Emmett Till (August 1955)","14‑year‑old Black boy from Chicago murdered in Mississippi after allegedly flirting with a white woman. His mother demanded open casket to show brutality. Two white defendants acquitted by all‑white jury in under two hours.","Deep‑seated racism; Jim Crow justice.","Galvanized the civil rights movement. Images of Till’s mutilated body shocked the nation.","Continuity – Lynching had occurred for decades. Till’s open‑casket funeral became a national media event.","Emmett Till vs. George Floyd – Both killings sparked mass protest; Till’s galvanized 1950s movement; Floyd’s 2020 protests."],
        [229,8,"Montgomery Bus Boycott (1955–1956)","Rosa Parks (NAACP secretary) refused to give up seat Dec 1, 1955; arrested. Black churches organized boycott; Women’s Political Council spread word. 26‑year‑old MLK emerged as leader. Lasted 381 days. Supreme Court ruled buses desegregated.","Segregated buses; Parks’ arrest; existing activism.","Made MLK a national figure; showed nonviolent protest could work.","Continuity – Earlier bus boycotts (Baton Rouge 1953). Montgomery gained national attention and court victory.","Montgomery Boycott vs. Greensboro sit‑ins – Both nonviolent; boycott on transportation; sit‑ins on lunch counters."],
        [230,8,"Little Rock Nine (1957)","Governor Orval Faubus used National Guard to block nine Black students from entering Little Rock Central High. Eisenhower sent 101st Airborne to escort them – first federal military intervention to protect Black rights since Reconstruction.","Brown v. Board; Faubus’s defiance.","Demonstrated federal commitment to desegregation. By end of 1950s, fewer than 2% of Black Southern students attended integrated schools.","Continuity – Federal troops used earlier to enforce law (Whiskey Rebellion). First time to protect Black civil rights.","Little Rock vs. Ole Miss (1962) – Both required federal troops; Little Rock (Eisenhower); Ole Miss (Kennedy)."],
        [231,8,"Greensboro Sit‑Ins & SNCC (1960)","Young activists sat at whites‑only lunch counters, demanding service. Mass arrests made front‑page news. Sparked 70,000+ participants across South. Led to formation of Student Nonviolent Coordinating Committee (SNCC).","Continued segregation; frustration with slow pace.","Gave young people a major role in the movement.","Continuity – Nonviolent protest used before (Congress of Racial Equality, 1940s). Greensboro sparked wave of direct action.","SNCC vs. SCLC – SNCC student‑led, more militant; SCLC church‑based, led by MLK."],
        [232,8,"Birmingham Campaign & Children’s Crusade (1963)","Public Safety Commissioner Bull Connor ordered high‑pressure fire hoses and police dogs against peaceful protesters, including children. Televised footage won massive sympathy.","Need to break segregation in one of the South’s most racist cities.","Public outrage pressured Kennedy to propose civil rights legislation.","Continuity – Nonviolent protests met with violence before. Children’s Crusade and response televised, shocking the nation.","Birmingham vs. Selma – Both used police brutality; Birmingham used dogs/hoses; Selma used beatings on 'Bloody Sunday.'"],
        [233,8,"March on Washington (August 28, 1963)","Over 200,000 activists at Lincoln Memorial. MLK delivered 'I Have a Dream' speech, calling for a society defined by racial equality.","Need to demonstrate support for civil rights legislation.","Galvanized public support; pressured Kennedy to act.","Continuity – Earlier marches (1941 March on Washington threat). Largest civil rights demonstration to that time.","March on Washington vs. Selma March – Washington was rally for legislation; Selma was for voting rights."],
        [234,8,"Civil Rights Act of 1964","Banned discrimination in public accommodations and employment based on race, religion, or sex.","Civil rights movement pressure; JFK’s proposal; LBJ’s legislative skill.","Ended Jim Crow in public facilities; created EEOC.","Continuity – Civil Rights Acts existed (1957, 1960). 1964 Act was the strongest, with enforcement.","Civil Rights Act of 1964 vs. Reconstruction Civil Rights Acts – 1964 had lasting enforcement; Reconstruction acts overturned after 1877."],
        [235,8,"Voting Rights Act of 1965","Eliminated literacy tests and poll taxes; authorized federal oversight of counties with historically low Black voter turnout.","Selma to Montgomery marches ('Bloody Sunday'); MLK’s campaign.","Black voter registration soared; transformed Southern politics.","Continuity – 15th Amendment prohibited race‑based voting denial. VRA provided federal enforcement.","Voting Rights Act vs. 15th Amendment – 15th was a promise; VRA delivered it."],
        [236,8,"Loving v. Virginia (1967)","Supreme Court struck down state laws banning interracial marriage, violating 14th Amendment’s equal protection and due process.","Virginia law criminalizing interracial marriage; Loving case.","Legalized interracial marriage nationwide.","Continuity – Some states had repealed such laws; Loving made them unconstitutional everywhere.","Loving v. Virginia vs. Obergefell v. Hodges – Both struck down marriage bans; Loving for race; Obergefell for same‑sex couples."],
        [237,8,"MLK vs. Malcolm X","MLK – nonviolent civil disobedience, racial integration, influenced by Thoreau and Gandhi. Malcolm X – Black separatism, self‑defense; argued Black Americans build independent institutions. Later changed views before assassination.","Different upbringings; different regions (South vs. North).","Provided two competing models for racial justice.","Continuity – Black leaders debated accommodation vs. agitation (Washington vs. Du Bois). Malcolm X’s influence grew after death.","MLK vs. Malcolm X – Similar goals; different means (nonviolence vs. any means necessary)."],
        [238,8,"Black Power & Black Panthers","Stokely Carmichael advocated Black Power (1966) – Black control of communities. Black Panther Party (1966, Huey P. Newton & Bobby Seale) demanded land, bread, housing, education, clothing, justice. Monitored police, ran free breakfast programs, medical clinics, educational classes.","Frustration with slow change; continued poverty and police brutality.","Provided social services; heavily persecuted by police and FBI.","Continuity – Black self‑defense groups existed (Deacons for Defense). Panthers more visible and politically organized.","Black Panthers vs. NAACP – NAACP used courts; Panthers used direct action and armed patrols."],
        [239,8,"Urban Uprisings (1965–1968)","Racial conflict national, not just Southern. Uprisings in Los Angeles (Watts 1965), Detroit (1967), Newark (1967), Chicago, Cleveland. Black communities struck out against white‑owned businesses.","Economic inequality, police brutality, de facto segregation in Northern cities.","Exposed that civil rights victories had not addressed Northern urban poverty.","Continuity – Race riots occurred earlier (Chicago 1919, Tulsa 1921). 1960s uprisings larger and televised live.","Watts vs. Tulsa – Both race riots; Tulsa destroyed a wealthy Black district; Watts targeted white businesses."],
        [240,8,"LBJ’s Great Society – Overview","LBJ’s 'unconditional war on poverty.' Key legislation: Economic Opportunity Act (1964), Medicare, Medicaid, Elementary and Secondary Education Act, HUD.","Civil rights movement momentum; Democratic majorities; LBJ’s skill.","Reduced poverty among elderly; transformed healthcare; undermined by Vietnam War.","Continuity – New Deal established welfare state. Great Society added health insurance (Medicare, Medicaid).","Great Society vs. New Deal – New Deal focused on jobs and social insurance; Great Society added health, education, housing."],
        [241,8,"1968 – The Year of Turmoil","Tet Offensive shattered LBJ’s credibility. MLK (April 4) and RFK (June 5) assassinated. Democratic National Convention in Chicago: police attacked protesters and media – 'police riot.' Nixon won using 'Southern Strategy.'","Vietnam frustration; racial tensions; political assassinations.","Ended the liberal era; ushered in conservative dominance.","Continuity – Political assassinations had occurred before (Lincoln, JFK). 1968 had two major assassinations within two months.","1968 vs. 1948 – Both tumultuous elections; 1948 Truman upset; 1968 Nixon victory signaled conservative turn."],
        [242,8,"Nixon’s Détente & China Visit (1972)","Nixon sought negotiation rather than confrontation. Visited communist China (1972) – first U.S. president – exploiting Sino‑Soviet split. Signed SALT I with USSR.","Desire to reduce Cold War tensions; play China against USSR.","Opened relations with China; limited nuclear arms.","Continuity – U.S. had informal contacts; Nixon’s visit was dramatic opening.","Nixon’s China opening vs. Truman’s recognition of Israel – Both bold diplomatic moves; Nixon’s geostrategic; Truman’s ideological."],
        [243,8,"Watergate (1972–1974)","Nixon’s operatives broke into Democratic headquarters at Watergate. Nixon covered up. When exposed, faced certain impeachment. Resigned August 1974 – only U.S. president to resign. Ford pardoned him.","Nixon’s paranoia; abuse of power.","Deeply eroded public trust in government. Led to campaign finance reforms.","Continuity – Presidential scandals existed (Teapot Dome). Watergate first to force resignation.","Watergate vs. Iran‑Contra – Both abuses; Nixon resigned; Reagan faced investigation but not impeached."],
        [244,8,"Pentagon Papers (1971)","Classified history of Vietnam leaked by Daniel Ellsberg, published by NY Times and Washington Post. Revealed government systematically lied to the public about Vietnam.","Government deception; Ellsberg’s conscience.","Increased distrust of government; Supreme Court allowed publication.","Continuity – Leaks occurred before. Pentagon Papers showed pattern of deliberate deception over multiple administrations.","Pentagon Papers vs. Iraq WMD deception – Both exposed false justifications for war."],
        [245,8,"Carter’s Foreign Policy – Camp David Accords (1978)","Carter brokered peace between Egypt (Anwar Sadat) and Israel (Menachem Begin) – first Arab nation to recognize Israel.","Need for Middle East stability; personal diplomacy.","Egyptian‑Israeli peace lasted; Carter’s greatest achievement.","Continuity – U.S. had mediated before (Kissinger’s shuttle). Camp David was a full treaty.","Camp David vs. Oslo Accords – Camp David led to formal peace treaty; Oslo was framework for Palestinian‑Israeli peace."],
        [246,8,"Iran Hostage Crisis (1979–1981)","50+ Americans held hostage after the Shah (U.S. ally) was overthrown. Carter’s rescue failed. Hostages released minutes after Reagan’s inauguration.","U.S. support for the Shah; Iranian revolution.","Made Carter appear weak; cost him reelection.","Continuity – U.S. had experienced hostage crises before. This lasted 444 days and was televised nightly.","Iranian hostage crisis vs. embassy bombings – Both anti‑American; hostage crisis prolonged; bombings instantaneous."],
        [247,8,"Postwar Economy & GI Bill (1944)","Servicemen’s Readjustment Act gave veterans college tuition, low‑interest home loans, business startup funds. Helped millions enter middle class.","Fear of another depression; need to reward veterans.","Expanded homeownership; educated workforce; fueled baby boom growth.","Continuity – Veterans had received benefits before (bonuses). GI Bill far more generous and transformative.","GI Bill vs. WWII veterans’ benefits – GI Bill included education, which earlier benefits did not."],
        [248,8,"Suburbanization & Levittown","Number of U.S. homes doubled during 1950s. William Levitt mass‑produced homes (Levittown), housing 40,000 people almost overnight. FHA insured long‑term low‑down‑payment loans.","Baby boom; demand for housing; FHA policies.","Created modern suburb; reinforced racial segregation through redlining.","Continuity – Suburbs existed before (streetcar suburbs). Levittown made suburbs mass‑market and racially exclusive.","Levittown vs. planned communities – Levittown was assembly‑line housing, not a design movement."],
        [249,8,"Interstate Highway Act (1956)","Built national highway system, accelerating suburban commuting, boosting auto industry, facilitating migration.","Eisenhower’s experience with German autobahns; need for military mobility.","Transformed American landscape; contributed to decline of downtowns.","Continuity – Federal road funding existed (1916). Interstate system was largest public works project in history.","Interstate highways vs. railroads – Both moved goods and people; highways favored cars; railroads declined."],
        [250,8,"1950s Mass Culture – Television","TV reached 90% of households by late 1950s. Sitcoms, sports, news created common national language. TV transformed politics (Kennedy‑Nixon debates, McCarthy hearings).","Postwar prosperity; technological advances.","Homogenized American culture; advertisers reached mass audiences.","Continuity – Radio had unified culture earlier. TV added visual immediacy, becoming dominant.","TV vs. Radio – Radio created shared listening; TV created shared viewing."],
        [251,8,"Rock ‘n’ Roll & Black Musical Roots","Rock rooted in Black artists (Chuck Berry, Little Richard, Fats Domino). White labels made inferior cover versions for white audiences. Elvis blended R&B and country. Older generations opposed it as rebellious.","Teen consumer market; racial segregation in music industry.","Broke down racial barriers in music (slowly). Gave teenagers distinct cultural identity.","Continuity – White artists covered Black songs before. Rock’s popularity forced recognition of Black musical innovation.","Rock ‘n’ roll vs. Jazz – Both Black roots; jazz became 'respectable'; rock seen as rebellious."],
        [252,8,"The Beat Generation & Counterculture","Beat writers (Kerouac, Salinger) rejected conformity. 1960s counterculture (hippies) in Haight‑Ashbury embraced communal living, marijuana, LSD, free love, rebellious music. Woodstock (1969) drew 400,000.","Conformist pressure of 1950s; reaction to materialism and Vietnam.","Challenged mainstream values; influenced later social movements. Movement fizzled by early 1970s.","Continuity – Bohemian movements existed earlier. Counterculture larger, more visible, linked to politics (anti‑war).","Beat Generation vs. Hippies – Beats were literary, focused on personal liberation; hippies communal and political."],
        [253,8,"The Feminine Mystique & NOW (1963, 1966)","Betty Friedan’s book exposed boredom of suburban housewives, selling millions. Led to founding of National Organization for Women (NOW) in 1966.","Postwar gender roles confining women; workplace discrimination.","Revitalized women’s rights movement; pushed for ERA, abortion rights.","Continuity – Women’s rights activism existed since Seneca Falls. The Feminine Mystique sparked 'second‑wave' feminism.","Second‑wave vs. First‑wave feminism – First wave focused on suffrage; second wave on workplace, reproductive rights, culture."],
        [254,8,"Roe v. Wade (1973)","Supreme Court ruled states could not ban abortion in first two trimesters, based on right to privacy under 14th Amendment’s due process clause.","Growing feminist movement; legal challenges to restrictive laws.","Legalized abortion nationwide; galvanized anti‑abortion movement (Religious Right).","Continuity – Some states had legalized abortion earlier (NY). Roe made it a constitutional right.","Roe v. Wade vs. Dobbs (2022) – Roe established a right; Dobbs overturned it, returning to states."],
        [255,8,"Environmental Movement – Silent Spring & EPA","Rachel Carson’s Silent Spring (1962) exposed DDT dangers and argued society was poisoning earth. Cuyahoga River caught fire (1969). Nixon created EPA (1970). Clean Air Act (1970), first Earth Day (1970), Clean Water Act (1972).","Industrial pollution; scientific evidence; public concern.","Modern environmental regulation; ongoing debates over climate change.","Continuity – Conservation movement existed (Pinchot, Muir). Environmentalism focused on pollution and public health.","Environmentalism vs. Conservation – Conservation managed resources for use; environmentalism curbed pollution."],
        [256,8,"Latino Rights – César Chávez & United Farm Workers (1962)","César Chávez and Dolores Huerta founded UFW to protect underpaid Mexican migrants. 1965 strike against grape growers led to nationwide boycott (1968). By 1970 they won increased wages. Brown Berets helped plan 1968 walkout of 15,000 Chicano students demanding educational reform.","Exploitative labor; lack of legal protections.","Improved wages and conditions; inspired Chicano movement.","Continuity – Earlier farm worker organizing failed. UFW used nonviolent tactics (fasts, boycotts).","UFW vs. AFL‑CIO – UFW focused on migrant farm workers; AFL‑CIO on industrial workers."],
        [257,8,"American Indian Movement (AIM)","Founded 1968 to represent urban Indians, reclaim heritage, achieve self‑determination. Occupied Alcatraz (1969–71, 89 Indians). Trail of Broken Treaties caravan (1972). Occupied Wounded Knee (1973) for 10 weeks, two activists killed.","Systemic poverty, treaty violations, loss of land and culture.","Led to Indian Self‑Determination Act of 1975, giving tribes control over lands, education, law enforcement.","Continuity – Native activism earlier (American Indian Movement predecessors). Alcatraz and Wounded Knee gained national media.","AIM vs. Black Panthers – Both militant, focused on self‑determination; AIM’s actions involved land occupation; Panthers focused on police violence."],
        [258,8,"Gay Liberation & Stonewall (1969)","June 27, 1969, police raided Stonewall Inn in NYC; patrons fought back in uprising that lasted all night. Gay Liberation Front formed, declaring itself revolutionary. First Pride parades in 1970. APA classified homosexuality as normal in 1973. Civil Service Commission ended ban on employing homosexuals in 1975.","Historic persecution of LGBTQ people; resistance to police harassment.","Modern LGBTQ rights movement; annual Pride celebrations.","Continuity – Earlier homophile groups existed (Mattachine Society). Stonewall was a militant uprising.","Stonewall vs. Compton’s Cafeteria riot (1966) – Both LGBTQ uprisings; Stonewall became iconic founding event."],
        [259,8,"Rise of Conservatism & the New Right","Three goals: stop moral/cultural decline, limit federal government/states’ rights, aggressive foreign policy. William F. Buckley founded National Review (1955). Goldwater’s 1964 campaign made states’ rights a staple. Nixon’s Southern Strategy appealed to white Southerners. Religious Right merged with politics; Jerry Falwell founded Moral Majority (1979); James Dobson founded Focus on the Family.","Reaction to 1960s liberalism; Roe v. Wade; counterculture; affirmative action.","Reagan’s election (1980) and modern conservatism.","Continuity – Conservatism existed before (Taft, Goldwater). Religious Right added moral dimension.","New Right vs. Old Right – Old Right focused on small government and isolationism; New Right added social issues and anti‑communism."]
    [260,9,"New Conservatism – The New Right","Grassroots movement reacting against liberal gains of 1960s–70s. Four groups: Neoconservatives (anti‑communist, strong defense), Religious Right (evangelicals), Pro‑Family Movement (anti‑abortion, anti‑ERA), and 1980 Election voters (Reagan coalition).","Social/moral backlash (counterculture, feminism, abortion, gay liberation) – 'family values.' Economic resentment (rising property taxes, inflation, anger over welfare).","Reagan elected 1980; conservative dominance through 2000s.","Continuity – Conservatism existed before (Goldwater). New Right more populist and religious.","New Right vs. Old Right – Old Right fiscal conservatism; New Right added social conservatism and Cold War hawkishness."],
        [261,9,"1970s Stagflation","Inflation + stagnant economy simultaneously. Manufacturing declined; 1971 first trade deficit of 20th century. Rust Belt lost half its manufacturing jobs by 1980. Two oil shocks (1973, 1979) caused gas lines, price spikes.","U.S. helped rebuild Japan, Germany, etc., who became competitors; OPEC oil embargo; Iranian Revolution.","Ended 25 years of postwar prosperity; created 'misery index'; paved way for Reaganomics.","Continuity – Economic downturns occurred. Stagflation combined inflation and recession, which economics thought impossible.","Stagflation vs. Great Depression – Both painful; Depression deflationary; stagflation inflationary."],
        [262,9,"Reaganomics (Supply‑Side Economics)","Major tax cuts for wealthy ('trickle‑down theory'), deregulation of banks, auto emissions, environment. Fired striking air traffic controllers (PATCO) → union membership declined.","Dissatisfaction with stagflation; belief that tax cuts stimulate growth.","Federal deficit increased (tax cuts + defense spending). Economy recovered but inequality grew.","Continuity – Tax cuts used before (Kennedy, Johnson). Supply‑side theory argued cutting taxes on the rich boosts overall growth.","Reaganomics vs. Keynesian economics – Keynesian uses spending to stimulate demand; supply‑side cuts taxes on producers."],
        [263,9,"Reagan’s Foreign Policy – Evil Empire & SDI","Called USSR 'evil empire.' Proposed SDI ('Star Wars') missile defense. Reagan Doctrine – support anti‑communist rebels worldwide. Sent Marines to Grenada (1983). Funded Contras in Nicaragua (Boland Amendment 1985 banned aid, leading to Iran‑Contra).","Anti‑communism; desire to roll back Soviet influence.","Increased tensions; massive defense spending contributed to Soviet collapse.","Continuity – Truman Doctrine also supported anti‑communists. Reagan Doctrine explicitly sought to overthrow existing communist governments.","Reagan Doctrine vs. Truman Doctrine – Truman aimed to contain; Reagan aimed to roll back."],
        [264,9,"Iran‑Contra Affair (1985–1987)","Reagan administration secretly sold arms to Iran (despite embargo) and used profits to fund Contras (despite Boland Amendment). Exposed 1986.","Desire to help Contras; free hostages in Lebanon.","Multiple officials indicted; Reagan’s approval fell but not impeached.","Continuity – Covert operations existed (Iran 1953). Iran‑Contra involved illegal diversion of funds.","Iran‑Contra vs. Watergate – Both involved cover‑ups; Watergate forced resignation; Iran‑Contra did not."],
        [265,9,"Gorbachev & End of Cold War","Gorbachev (1985) introduced glasnost (openness) and perestroika (economic restructuring). Reagan: 'Tear down this wall!' (Berlin 1987). INF Treaty (1987) eliminated intermediate‑range nuclear weapons. Berlin Wall fell 1989; USSR dissolved 1991 under George H.W. Bush.","Soviet economic collapse under arms race pressure; Gorbachev’s reforms.","End of Cold War; U.S. as sole superpower.","Continuity – Arms control existed (SALT). INF eliminated an entire class of weapons; Cold War ended peacefully.","End of Cold War vs. End of WWII – WWII ended with occupation; Cold War ended with dissolution of USSR without war."],
        [266,9,"George H.W. Bush – Persian Gulf War (1990–91)","'Operation Desert Storm' – U.S.‑led coalition expelled Iraq from Kuwait. Military success. Bush insisted on not removing Saddam Hussein (controversial).","Iraq’s invasion of Kuwait (August 1990); oil interests; UN resolutions.","Demonstrated U.S. military power; set stage for later Iraq War. Bush lost 1992 election despite high approval.","Continuity – U.S. had intervened in Middle East before. Desert Storm was UN‑sanctioned, widely supported.","Persian Gulf War vs. Iraq War (2003) – Gulf War had UN approval and clear aims (liberate Kuwait); Iraq War based on controversial WMD claims."],
        [267,9,"Clinton – NAFTA & Don’t Ask, Don’t Tell (1993–1994)","NAFTA (1994) – reduced trade barriers between US, Mexico, Canada. 'Don’t Ask, Don’t Tell' – allowed gay people to serve if they kept orientation secret; prohibited discrimination but also banned open service.","Globalization demands; campaign promise on gays in military (compromise).","NAFTA increased trade but cost some manufacturing jobs. DADT remained law until 2011.","Continuity – NAFTA continued trade liberalization (GATT). DADT was a compromise, not full equality.","DADT vs. EO 9981 – Both addressed military discrimination; EO 9981 desegregated; DADT allowed service but forced secrecy."],
        [268,9,"Clinton’s Impeachment (1998)","House impeached Clinton for perjury and obstruction (Lewinsky affair). Senate acquitted; he remained in office.","Affair with White House intern; lying under oath.","Damaged legacy but approval high. Set precedent that partisan impeachment could occur.","Continuity – Prior impeachments (Johnson, Nixon resigned). Clinton was second impeached, but first for personal scandal.","Clinton impeachment vs. Johnson impeachment – Both acquitted; Johnson over Reconstruction policy; Clinton over personal misconduct."],
        [269,9,"George W. Bush – 9/11 & War on Terror (2001)","Al‑Qaeda hijacked four planes; 2,977 killed; WTC and Pentagon destroyed. War on Terror declared. Afghanistan invaded (Taliban refused to hand over bin Laden). Created Department of Homeland Security.","Rise of Islamist terrorism; bin Laden’s hatred of U.S. presence in Middle East.","Vastly expanded surveillance (PATRIOT Act); two wars (Afghanistan, Iraq). Foreign policy focused on counterterrorism.","Continuity – U.S. fought guerrilla wars before. War on Terror open‑ended, global; PATRIOT Act curtailed civil liberties.","9/11 vs. Pearl Harbor – Both surprise attacks leading to war; 9/11 by non‑state actors; Pearl Harbor by a state."],
        [270,9,"PATRIOT Act (2001)","Expanded government surveillance of phone, email, financial records; allowed indefinite detention of non‑citizens. Reauthorized several times.","9/11 attacks; desire to prevent future terrorism.","Civil liberties groups criticized privacy violations. Permanent expansion of federal surveillance.","Continuity – Wartime surveillance existed (Espionage Act). PATRIOT Act applied in non‑traditional war with no clear end.","PATRIOT Act vs. Alien & Sedition Acts – Both expanded government power in response to threats."],
        [271,9,"Iraq War (2003)","Operation Iraqi Freedom – U.S. invaded Iraq based on claims that Saddam Hussein had WMDs and links to 9/11. No WMDs found. Hussein toppled, region became unstable.","Post‑9/11 fear; neoconservative desire to transform Middle East.","Prolonged war; thousands of U.S. casualties; rise of ISIS; damaged U.S. credibility.","Continuity – U.S. intervened in Iraq before (Gulf War). 2003 war based on false pre‑emptive justifications.","Iraq War vs. Vietnam – Both became long, costly counterinsurgencies; Iraq War launched pre‑emptively."],
        [272,9,"Great Recession (2008)","Severe global downturn triggered by housing bubble collapse, subprime mortgage crisis, and failure of major financial institutions (Lehman Brothers). Bush presidency ended with this crisis.","Deregulation; risky lending; lack of oversight.","Mass foreclosures; high unemployment; government bailouts (TARP); Obama’s stimulus.","Continuity – Economic recessions before. Great Recession worst since Great Depression.","Great Recession vs. Great Depression – Both severe; Depression led to New Deal; Recession led to stimulus and regulation (Dodd‑Frank)."],
        [273,9,"Barack Obama – Affordable Care Act (2010)","'Obamacare' – required most Americans to have health insurance, created marketplaces, expanded Medicaid, prohibited denial for pre‑existing conditions.","High number of uninsured; rising healthcare costs.","Insured millions; highly controversial; survived Supreme Court challenges.","Continuity – Federal healthcare involvement existed (Medicare, Medicaid). ACA mandated individual coverage, a new approach.","ACA vs. Clinton’s failed healthcare plan – Both sought universal coverage; Clinton’s more complex and failed; ACA passed."],
        [274,9,"Killing of Osama bin Laden (2011)","Navy SEALs raided compound in Abbottabad, Pakistan, killing al‑Qaeda leader.","Manhunt since 9/11; intelligence from CIA.","Symbolic closure for 9/11 families; boost for Obama’s foreign policy.","Continuity – U.S. killed enemy leaders before. Bin Laden was 9/11 mastermind; his death major counterterrorism success.","Killing bin Laden vs. Hitler’s suicide – Both ending major threats; bin Laden killed by military operation; Hitler by suicide."],
        [275,9,"Technology – Internet & Globalization","Internet developed in 1960s for military; World Wide Web launched 1990s; accelerated global commerce. Cell phones widespread. Globalization = economic interdependence of all nations.","Technological innovation; end of Cold War opened markets.","Rise of 'knowledge workers'; outsourcing of manufacturing; wealth inequality grew (top 1% held 1/3 of wealth by early 2000s).","Continuity – U.S. long promoted free trade. Internet made globalization instantaneous; neoliberalism (free market policy) dominated.","Globalization vs. earlier trade eras – Earlier trade in physical goods; globalization includes digital services and capital flows."],

    // For the purpose of this quiz, the actual working file contains the full dataset.

    // Quiz state
    let currentQuestions = [];     // array of { questionText, correctTitle, options, cardId }
    let currentIndex = 0;
    let userAnswers = [];          // store selected option index per question
    let quizActive = false;
    
    // DOM elements
    const periodSelect = document.getElementById('periodSelect');
    const qCountSelect = document.getElementById('questionCountSelect');
    const startBtn = document.getElementById('startQuizBtn');
    const quizArea = document.getElementById('quizArea');
    
    // Utility: get all cards in selected period
    function getFilteredCards() {
        const period = periodSelect.value;
        if (period === 'all') return cardsData;
        return cardsData.filter(c => c[1] == period);
    }
    
    // Generate a multiple choice question from a specific card
    function generateQuestion(card, allCardsInPeriod) {
        const [id, period, title, definition, causes, effects, continuity, compare] = card;
        // Choose a random section to ask about
        const sections = [
            { text: definition, name: "Definition" },
            { text: causes, name: "Causes" },
            { text: effects, name: "Effects" },
            { text: continuity, name: "Continuity & Change" },
            { text: compare, name: "Compare & Contrast" }
        ];
        // Filter out empty or too short sections
        const validSections = sections.filter(s => s.text && s.text.length > 20);
        const chosen = validSections.length > 0 ? validSections[Math.floor(Math.random() * validSections.length)] : sections[0];
        
        let questionText = `📖 ${chosen.name}:<br> "${chosen.text.substring(0, 300)}${chosen.text.length > 300 ? '…' : ''}"<br><br>Which term does this describe?`;
        
        // Get correct answer (title)
        const correct = title;
        // Get other titles from the same period (distractors)
        let otherTitles = allCardsInPeriod.filter(c => c[0] !== id).map(c => c[2]);
        // Shuffle and pick up to 3 distinct distractors
        otherTitles = [...new Set(otherTitles)]; // remove duplicates
        for (let i = otherTitles.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [otherTitles[i], otherTitles[j]] = [otherTitles[j], otherTitles[i]];
        }
        const distractors = otherTitles.slice(0, 3);
        // If not enough distractors, add generic fallbacks
        while (distractors.length < 3) {
            distractors.push("(Historical event)");
        }
        const options = [correct, ...distractors];
        // Shuffle options
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return {
            questionText,
            correctTitle: correct,
            options: options,
            cardId: id
        };
    }
    
    // Generate a full quiz
    function generateQuiz() {
        const filtered = getFilteredCards();
        if (filtered.length === 0) {
            quizArea.innerHTML = '<div style="padding:2rem; text-align:center;">No cards in this period. Choose another.</div>';
            return false;
        }
        let limit = qCountSelect.value;
        let numQuestions = limit === 'all' ? filtered.length : Math.min(parseInt(limit), filtered.length);
        if (numQuestions === 0) numQuestions = filtered.length;
        
        // Shuffle filtered cards
        const shuffled = [...filtered];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        const selectedCards = shuffled.slice(0, numQuestions);
        const questions = [];
        for (let card of selectedCards) {
            questions.push(generateQuestion(card, filtered));
        }
        return questions;
    }
    
    // Render current question
    function renderCurrentQuestion() {
        if (!quizActive || currentIndex >= currentQuestions.length) {
            finishQuiz();
            return;
        }
        const q = currentQuestions[currentIndex];
        const saved = userAnswers[currentIndex];
        const selectedIndex = (saved !== undefined && saved !== null) ? saved : -1;
        
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            const isSelected = (selectedIndex === idx);
            optionsHtml += `
                <div class="option" data-opt-index="${idx}">
                    <input type="radio" name="question" value="${idx}" id="opt_${idx}" ${isSelected ? 'checked' : ''}>
                    <label for="opt_${idx}" style="flex:1; cursor:pointer;">${opt}</label>
                </div>
            `;
        });
        
        const html = `
            <div class="quiz-card">
                <div class="question-text">${q.questionText}</div>
                <div class="options" id="optionsContainer">
                    ${optionsHtml}
                </div>
                <div class="quiz-footer">
                    <div class="score">Question ${currentIndex+1} / ${currentQuestions.length}</div>
                    <button id="nextQuestionBtn" class="next-btn">Next →</button>
                </div>
                <div id="feedbackArea"></div>
            </div>
        `;
        quizArea.innerHTML = html;
        
        // attach event listeners to radio buttons (via container)
        const optionsDivs = document.querySelectorAll('.option');
        optionsDivs.forEach(div => {
            div.addEventListener('click', (e) => {
                const radio = div.querySelector('input[type="radio"]');
                if (radio) {
                    radio.checked = true;
                    // trigger change to save answer
                    const idx = parseInt(div.getAttribute('data-opt-index'));
                    userAnswers[currentIndex] = idx;
                    // clear previous feedback to allow new selection
                    const fb = document.getElementById('feedbackArea');
                    if (fb) fb.innerHTML = '';
                }
            });
            const radio = div.querySelector('input');
            if (radio) {
                radio.addEventListener('change', (e) => {
                    const idx = parseInt(div.getAttribute('data-opt-index'));
                    userAnswers[currentIndex] = idx;
                    const fb = document.getElementById('feedbackArea');
                    if (fb) fb.innerHTML = '';
                });
            }
        });
        
        // next button handler
        const nextBtn = document.getElementById('nextQuestionBtn');
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                // check if answered
                if (userAnswers[currentIndex] === undefined) {
                    const fb = document.getElementById('feedbackArea');
                    fb.innerHTML = '<div class="feedback incorrect">⚠️ Please select an answer before continuing.</div>';
                    return;
                }
                // show feedback: correct/incorrect
                const selectedIdx = userAnswers[currentIndex];
                const selectedText = q.options[selectedIdx];
                const isCorrect = (selectedText === q.correctTitle);
                const feedbackDiv = document.getElementById('feedbackArea');
                if (isCorrect) {
                    feedbackDiv.innerHTML = '<div class="feedback correct">✅ Correct! Well done.</div>';
                } else {
                    feedbackDiv.innerHTML = `<div class="feedback incorrect">❌ Incorrect. The correct answer is: <strong>${q.correctTitle}</strong>.</div>`;
                }
                // move to next after short delay
                setTimeout(() => {
                    currentIndex++;
                    renderCurrentQuestion();
                }, 1200);
            });
        }
    }
    
    function finishQuiz() {
        quizActive = false;
        // calculate score
        let score = 0;
        for (let i = 0; i < currentQuestions.length; i++) {
            const q = currentQuestions[i];
            const selectedIdx = userAnswers[i];
            if (selectedIdx !== undefined && q.options[selectedIdx] === q.correctTitle) {
                score++;
            }
        }
        const percent = Math.round((score / currentQuestions.length) * 100);
        let feedbackClass = '';
        let message = '';
        if (percent >= 90) message = '🌟 Excellent! You mastered this period.';
        else if (percent >= 70) message = '👍 Good job! Review the ones you missed.';
        else message = '📚 Keep studying with the flashcards and try again.';
        
        quizArea.innerHTML = `
            <div class="quiz-card" style="text-align:center;">
                <h2>Quiz Complete!</h2>
                <div class="score" style="font-size:2rem; margin:1rem 0;">${score} / ${currentQuestions.length}</div>
                <div style="font-size:1.2rem;">${percent}% – ${message}</div>
                <button id="restartQuizBtn" class="next-btn" style="margin-top:1.5rem;">🔄 Take Another Quiz</button>
            </div>
        `;
        document.getElementById('restartQuizBtn')?.addEventListener('click', () => {
            startQuiz();
        });
    }
    
    function startQuiz() {
        const questions = generateQuiz();
        if (!questions || questions.length === 0) {
            quizArea.innerHTML = '<div style="padding:2rem; text-align:center;">Not enough cards to create a quiz. Try a broader period.</div>';
            return;
        }
        currentQuestions = questions;
        currentIndex = 0;
        userAnswers = new Array(currentQuestions.length).fill(undefined);
        quizActive = true;
        renderCurrentQuestion();
    }
