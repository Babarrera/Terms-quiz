<script>
    // --------------------------------------------------------------
    // FULL CARDS DATA – exactly as provided (276 cards)
    // For space, I embed the complete dataset from previous parts.
    // In production, this array contains all 276 entries.
    // --------------------------------------------------------------
    const cardsData = [
        [1,1,"Pre-Columbian Native Societies (c. 1491)","Diverse, complex societies adapted to environments. Examples: Aztecs (urban Tenochtitlan, tribute), Pueblos (maize, cliff dwellings), Eastern Woodlands (matrilineal Iroquois, hunting/farming mix). Cahokia (30,000 near St. Louis, 1200 CE). Maize cultivation → less hunting/gathering, permanent villages. Iroquois Confederacy. Animism.","Migration via Bering Strait; adaptation to regional environments.","Population growth (Tenochtitlan 250,000); complex political structures; vulnerability to European diseases later.","Continuity – Native societies continued adapting to environment. Change – Maize shifted some from nomadic to sedentary; Cahokia rose and declined pre‑1492.","Aztecs (centralized empire) vs. Iroquois (confederacy) vs. Pueblos (village‑based). All agricultural but different political structures."],
        [2,1,"Columbus's Voyage (1492)","Triggered Columbian Exchange – global transfer of goods, people, diseases, ideas between Old and New Worlds.","European search for direct trade routes to Asia; Spanish sponsorship.","Native demographic catastrophe (80%+ died from disease); rise of transatlantic slave trade; European dominance.","Continuity – European desire for wealth/empire continued. Change – Before 1492, hemispheres separate; after, permanently linked.","Columbus vs. later explorers (Cabot, Vespucci) – Columbus first to establish lasting contact; others mapped/conquered."],
        [3,1,"Columbian Exchange (1492 onward)","Widespread exchange of animals, plants, microbes, people. Horses transformed Native mobility; corn/potatoes → European population boom; smallpox killed millions; tobacco fueled plantation economies; slavery created racial caste systems.","Contact between previously separate hemispheres after 1492.","New World got horses, cattle, wheat, sugar, Old World diseases. Old World got corn, potatoes, tomatoes, tobacco, syphilis. Massive Native depopulation; African slavery expanded.","Continuity – Trade between hemispheres continued. Change – Before exchange, no horses in Americas, no tomatoes in Europe; after, both transformed agriculture and warfare.","Old World vs. New World contributions – Old gave animals/diseases; New gave crops (corn, potato) that fueled population growth globally."],
        [4,1,"Valladolid Debates (1550–1551)","Sepúlveda argued Indians are 'natural slaves' – intellectually inferior, savage practices, no private property. Las Casas argued Indians are brothers – sophisticated societies, capacity for reason, share humanity and Christian brotherhood.","Spanish brutality and forced conversion; religious and moral questions.","No clear winner, but Las Casas helped shift some Spanish policies; set precedent for human rights discussions.","Continuity – European racism toward Natives persisted. Change – First formal debate on treatment of conquered peoples; influenced later arguments for Native rights.","Sepúlveda (Aristotelian natural slavery) vs. Las Casas (Thomistic natural law/human dignity). Both Christian but opposite conclusions."],
        [5,1,"Encomienda System (1500s)","Forced Native labor on plantations and mines. Spanish crown granted colonists labor/tribute in exchange for 'protection' and Christian instruction.","Need for cheap labor after Columbus; Spanish desire for gold/silver.","Massive Native population decline; replaced by African slave labor; creation of mestizo/mulatto classes.","Continuity – Forced labor systems persisted (replaced by African slavery). Change – Encomienda legally ended mid‑1500s; replaced by repartimiento.","Encomienda vs. English indentured servitude – both forced labor; encomienda claimed 'protection/Christianization'; indentured had contract end date."],
        [6,1,"New France (1608)","French colony centered on fur trade. Alliances and intermarriage with Natives (Métis). Few settlers, no representative assembly.","Fur trade (beaver pelts) highly profitable; French Catholic missions.","Allied with Huron against Iroquois; limited colonial population; lost to Britain in 1763.","Continuity – France never sent large settlers; fur trade remained central. Change – After 1763, France lost all North American colonies.","New France vs. New Spain vs. New England – France: few settlers, good Native relations; Spain: conquest, encomienda; England: large settlements, Native exclusion."]
        [7,2,"Jamestown Founded (1607)","First permanent English settlement. Initially disastrous; tobacco saved colony.","Joint‑stock company (Virginia Company) seeking profit; English rivalry with Spain.","Headright system; Bacon's Rebellion → shift to African slavery; House of Burgesses (1619) – first representative assembly.","Continuity – English continued founding colonies. Change – Jamestown shifted from gold‑seeking to tobacco agriculture; from mostly male to families.","Jamestown vs. Plymouth (1620) – Jamestown profit‑driven, Anglican; Plymouth religious refuge, Separatist."],
        [8,2,"First Africans in Jamestown (1619)","First recorded Africans in English North America. Initially indentured servants, set stage for race‑based chattel slavery.","Atlantic slave trade already established; labor demand in tobacco fields.","Gradual codification of chattel slavery (status of mother determined enslavement); rigid racial caste system.","Continuity – Slavery existed worldwide. Change – Race‑based, hereditary chattel slavery (unique to Americas). First Africans had rights; by 1660s, permanent enslavement codified.","African slavery vs. indentured servitude – chattel slavery permanent, hereditary, race‑based; indentured had end dates."],
        [9,2,"Mayflower Compact (1620)","Agreement signed by Pilgrims at Plymouth. Established self‑government by majority rule. First written framework in English colony.","Pilgrims landed outside Virginia Company's jurisdiction; needed social contract.","Model for later democratic governance; influenced New England town meetings.","Continuity – English tradition of written agreements. Change – First social contract in New World; precedent for colonial charters and Declaration of Independence.","Mayflower Compact vs. House of Burgesses – Compact direct democracy (all male signers); House representative (elected)."],
        [10,2,"New Amsterdam (1624–1664)","Dutch trading hub (later New York). Joint‑stock company, religious toleration, fur trade alliances with Iroquois (guns).","Dutch desire for commercial profit; mercantilism.","Became New York after English takeover (1664); legacy of religious and ethnic diversity.","Continuity – New York remained commercial and diverse under English. Change – Dutch patroon system replaced by English land grants; Dutch Reformed Church lost official status.","New Amsterdam vs. New England – Dutch focused on trade, tolerated diversity; English Puritans focused on religion, intolerant."],
        [11,2,"Massachusetts Bay Colony / 'City upon a Hill' (1630)","Puritan colony led by John Winthrop. 'City upon a hill' – model Christian society. Self‑governance through freemen voting.","Religious persecution in England; desire for reformed Protestant society.","Religious intolerance (banished Roger Williams, Anne Hutchinson); town meeting government; foundation of New England identity.","Continuity – Puritan influence long after 1600s. Change – Religious uniformity gave way to toleration. 'City upon a hill' became American exceptionalism trope.","Massachusetts Bay vs. Rhode Island – Mass Bay religious intolerance; Rhode Island religious freedom, separation of church and state."],
        [12,2,"Navigation Acts (1651–1730s)","British laws restricting colonial trade to English ships and enumerated goods (tobacco, sugar, cotton). Enforced mercantilism.","British desire to control trade and maximize wealth.","Limited colonial economic freedom; led to smuggling; salutary neglect allowed colonial autonomy; after 1763, stricter enforcement sparked resistance.","Continuity – Britain maintained mercantilism. Change – Salutary neglect (pre‑1763) vs. strict enforcement (post‑1763). Shift caused colonial resentment and revolution.","Navigation Acts vs. American mercantilism later (Hamilton's plan) – both protected domestic industry; British system benefited mother country; American system benefited new nation."],
        [13,2,"Bacon's Rebellion (1676)","Nathaniel Bacon led frontier farmers (former indentured servants) attacking Natives then burning Jamestown, opposing Governor Berkeley's friendly Native policies.","Land scarcity for freed indentured servants; conflict with Natives; resentment toward coastal elite.","Planters turned to African slaves as more controllable labor force. Exposed class tensions. Accelerated shift to race‑based slavery.","Continuity – Class tensions between elite and poor persisted. Change – Shift from indentured servitude to slavery as primary labor; white unity across class developed after.","Bacon's Rebellion vs. Shays' Rebellion (1786) – both farmers against elites; Bacon attacked Natives and rich; Shays attacked courts over debt. Bacon accelerated slavery shift; Shays accelerated Constitution."],
        [14,2,"Metacom's War / King Philip's War (1675–1676)","Bloody conflict between New England colonists and Native coalition led by Metacom (King Philip). Devastated Native power in New England.","Colonial expansion onto Native lands; broken treaties; pressure on Native resources.","Thousands dead on both sides; Native resistance crushed; New England colonists secured dominance; symbolized failure of coexistence.","Continuity – Native resistance elsewhere (Pontiac's Rebellion 1763). Change – After 1676, New England Natives never again posed major military threat.","Metacom's War vs. Pueblo Revolt (1680) – both uprisings; Pueblo succeeded temporarily; Metacom failed disastrously. Different outcomes due to Spanish vs. English colonial patterns."],
        [15,2,"Pueblo Revolt (1680)","Successful Native uprising against Spanish in New Mexico. Destroyed churches, killed settlers, drove Spanish out for ~12 years.","Forced labor (encomienda), forced conversion, suppression of Pueblo religion.","Spanish returned with more tolerance; became more cautious about forced conversion; symbol of Native resistance.","Continuity – Spanish colonial control eventually reestablished. Change – Only successful Native expulsion of Europeans in North America; Spanish changed tactics afterward.","Pueblo Revolt vs. Metacom's War – Pueblo succeeded temporarily; Metacom failed. Different outcomes due to Spanish vs. English colonial patterns."],
        [16,2,"Salem Witch Trials (1692)","Series of hearings and executions for alleged witchcraft; 20+ executed. Example of religious extremism and social anxiety.","Puritan religious intensity; social tensions (family feuds, economic changes); fear of outsiders/change.","Decline of Puritan religious authority; shift toward rational/Enlightenment thinking; caution against mass hysteria.","Continuity – Religious enthusiasm continued (Great Awakening 1730s‑40s). Change – After Salem, legal standards changed (spectral evidence no longer allowed); Puritan theocracy weakened.","Salem vs. European witch hunts – both used spectral evidence; Salem scale smaller but became symbol of American religious extremism."],
        [17,2,"Stono Rebellion (1739)","Slave uprising in South Carolina. ~20 enslaved people gathered near Stono River, killed several whites, attempted to flee to Spanish Florida.","Brutal conditions of chattel slavery; Spanish promise of freedom to runaways.","Stricter slave codes (Negro Act of 1740) – prohibited assembly, education, earning money; reduced enslaved people's autonomy.","Continuity – Slave rebellions continued (NY 1712, Gabriel 1800, Nat Turner 1831). Change – After Stono, South Carolina's slave codes became the model for other colonies; enslaved people's legal rights virtually eliminated.","Stono vs. Nat Turner (1831) – Stono goal: reach Spanish Florida; Turner's religious vision. Both crushed; Stono led to stricter codes; Turner's led to even harsher codes and anti‑abolitionist backlash."],
        [18,2,"First Great Awakening (1730s–1770s)","Religious revival emphasizing emotional, personal faith. Key figures: Jonathan Edwards ('Sinners in the Hands of an Angry God'), George Whitefield. Old Lights vs. New Lights.","Reaction against dry, intellectual Enlightenment rationalism; desire for emotional religious experience.","Undermined established church authority; encouraged individualism and questioning of authority; fostered shared colonial identity (first 'American' event); increased religious denominations (Baptists, Methodists).","Continuity – Religious revivals recur (Second Great Awakening 1800s). Change – Before, colonies had established churches; after, religious pluralism and disestablishment. First time colonists saw themselves as 'Americans' across colonies.","First Great Awakening vs. Second Great Awakening. First: individual salvation, emotional preaching; Second: social reform (abolition, temperance), Charles Finney. Both undermined authority."],
        [19,2,"Enlightenment (18th century)","Intellectual movement emphasizing reason, science, natural law, and individual rights. Key figures: John Locke (natural rights: life, liberty, property), Montesquieu (separation of powers), Rousseau (social contract).","Scientific Revolution; European philosophers who challenged absolutism; colonial education and transatlantic print culture.","Philosophical foundation for American Revolution; influenced Declaration of Independence, Constitution, Bill of Rights.","Continuity – Enlightenment ideals remain central. Change – Before, divine right of kings; after, government by consent.","Enlightenment vs. Great Awakening – reason vs. emotion; both undermined traditional authority from opposite directions."]
    [20,3,"French and Indian War / Seven Years' War (1754–1763)","Global conflict between Britain and France. In North America, Britain (+ colonists) fought France (+ Indian allies) over control of the Ohio River Valley. Ended with Treaty of Paris (1763): Britain gained French Canada and all land east of the Mississippi River; France removed; Spain got Louisiana.","Competing claims to Ohio Valley; colonists wanted to expand west; French built forts to block them.","Britain incurred massive war debt → ended salutary neglect → imposed new taxes on colonists (Sugar Act, Stamp Act). Britain gained vast territory but also faced Pontiac's Rebellion (1763). The Proclamation of 1763 (forbidding western settlement) angered colonists.","Continuity – Anglo‑French rivalry continued globally, but never again in North America. Change – Before the war, France was a major power in North America; after, Britain was dominant. Colonists had fought alongside Britain as partners; after the war, they were treated as subjects to be taxed, fueling independence sentiment.","French and Indian War vs. American Revolution. In the French war, colonists fought with the British against a common enemy; in the Revolution, they fought against the British. The war debt from the first caused the imperial crisis that led to the second."],
        [21,3,"Albany Plan of Union (1754)","Benjamin Franklin's proposal for a unified colonial government (Grand Council) to manage defense and Indian affairs. Each colony would send delegates, with a president appointed by the Crown. Rejected by both the colonial assemblies and the British government.","Need for coordinated defense during the French and Indian War; Franklin recognized that disunity made the colonies vulnerable.","Set a precedent for later unification (the Continental Congress, 1774). Franklin's 'Join or Die' cartoon (a snake cut into pieces) became a powerful symbol of colonial unity and was widely reprinted during the Revolution.","Continuity – Colonial assemblies continued to act independently until the 1770s. Change – The Albany Plan was the first formal proposal for a federal‑style American government; although rejected, its framework (a central council with delegated powers) previewed the Articles of Confederation and the Constitution.","Albany Plan vs. Articles of Confederation (1781). Both created a central council with limited authority; the Albany Plan had a Crown‑appointed president, while the Articles had no executive. Both gave the states/colonies significant power and were ultimately rejected or replaced."],
        [22,3,"Pontiac's Rebellion (1763)","A Native American uprising led by Ottawa chief Pontiac against British forts and settlements in the Great Lakes region. Natives attacked British posts, destroyed supply lines, and killed hundreds of settlers.","After the French and Indian War, the British took control of former French lands, refused to continue the French practice of giving gifts to Natives, and allowed settlers to move onto Native lands without negotiation. Natives saw the British as a far greater threat than the French.","The British response was costly and brutal (including the distribution of smallpox‑infected blankets at Fort Pitt). To prevent further costly wars, the British issued the Proclamation of 1763, which forbade colonial settlement west of the Appalachian Mountains – one of the major grievances that led to the American Revolution.","Continuity – Native resistance to European expansion continued (Metacom's War, later Tecumseh). Change – Pontiac's Rebellion directly triggered the Proclamation Line, which angered colonists and contributed to revolutionary sentiment. It also showed Britain that controlling the interior would be expensive and difficult.","Pontiac's Rebellion vs. Metacom's War (1675‑76). Both were pan‑Native uprisings against colonial expansion. Metacom's War occurred in New England and was crushed with high casualties; Pontiac's Rebellion in the Great Lakes led to a negotiated peace but forced Britain to change policy (the Proclamation Line). Both failed to stop expansion, but Pontiac's had a direct impact on British colonial policy."],
        [23,3,"Proclamation of 1763 (1763)","British royal decree that forbade colonial settlement west of the Appalachian Mountains. The land was reserved for Native Americans. The Proclamation also established four new colonies (Quebec, East Florida, West Florida, Grenada) and regulated Indian trade.","British desire to avoid further expensive and bloody conflicts with Natives after Pontiac's Rebellion; Britain needed time to organize the newly acquired western territories.","Angered colonists who had fought in the French and Indian War and expected to be rewarded with western land. Many colonists ignored the Proclamation and moved west anyway, increasing tensions with both Natives and British authorities. It became one of the major grievances listed in the Declaration of Independence.","Continuity – Britain had attempted to restrict colonial expansion before (e.g., 1609 charter limits). Change – Before 1763, colonists largely accepted British regulation of trade but not of settlement; after 1763, the Proclamation directly restricted westward movement, which many colonists saw as an attack on their liberty and prosperity.","Proclamation of 1763 vs. Northwest Ordinance (1787). The Proclamation was a British attempt to restrict settlement to protect Native lands (and British administrative control); the Northwest Ordinance was an American attempt to encourage settlement (while eventually banning slavery in the territory). Both regulated western lands, but with opposite aims."],
        [24,3,"Sugar Act (1764)","British tax on foreign molasses imported into the colonies; expanded customs service; allowed trials without juries (vice‑admiralty courts). Unlike the earlier Molasses Act (1733), the Sugar Act was strictly enforced.","British need to raise revenue to pay off massive debt from the French and Indian War; Prime Minister Grenville's plan to make colonies pay for their own defense.","Colonists argued 'no taxation without representation' – they had no seats in Parliament, so Parliament had no right to tax them directly. Merchants were angered by stricter enforcement. It was the first tax explicitly aimed at raising revenue, not just regulating trade.","Continuity – Britain had taxed colonial trade before (Molasses Act 1733, mostly unenforced). Change – The Sugar Act was enforced and designed to raise revenue, not merely regulate commerce. This shift from regulation to taxation without representation sparked the core colonial grievance.","Sugar Act vs. Stamp Act (1765). The Sugar Act was an external tax (on imported goods), and colonists were less unified against it. The Stamp Act was an internal tax (direct on colonists, on paper goods), and it provoked massive, unified resistance, including the Stamp Act Congress and boycotts."],
        [25,3,"Stamp Act (1765)","First direct tax on colonists – required paid stamps on printed goods (newspapers, legal documents, playing cards, dice). An internal tax – paid directly by colonists, not through trade.","British need for additional revenue after the Sugar Act proved insufficient and faced resistance.","Violent protests, boycotts, and the formation of the Sons of Liberty, who intimidated stamp distributors. The Stamp Act Congress (1765) brought nine colonies together for the first time, issuing a Declaration of Rights and Grievances. Parliament repealed the Stamp Act in 1766 but immediately passed the Declaratory Act, asserting its full authority to make laws binding on the colonies 'in all cases whatsoever.'","Continuity – Colonial boycotts of British goods became a standard tactic of resistance (used later against Townshend Acts, Tea Act). Change – The Stamp Act Congress was the first intercolonial political meeting, laying the groundwork for the Continental Congress. The repeal showed that economic pressure worked, but the Declaratory Act kept the constitutional debate alive.","Stamp Act vs. Townshend Acts (1767). The Stamp Act was an internal, direct tax (repealed after protests). The Townshend Acts were external duties on imported goods (glass, lead, paint, tea), designed to be less controversial, but they still provoked boycotts and led to the Boston Massacre."],
        [26,3,"Townshend Acts (1767–1768)","Taxes on imported goods (glass, lead, paint, paper, tea). The revenue was used to pay the salaries of royal governors and judges, making them independent of colonial assemblies. Also created the American Board of Customs Commissioners to enforce trade laws.","British need for revenue after the Stamp Act was repealed; Chancellor of the Exchequer Charles Townshend wanted to assert Parliament's authority and reduce colonial autonomy.","Colonial boycotts – especially of British luxury goods. The Daughters of Liberty encouraged producing homespun cloth as an alternative. British troops were sent to Boston in 1768 to maintain order, leading directly to the Boston Massacre (1770). Most Townshend duties were repealed in 1770, except for the tax on tea, which was kept to symbolically assert Parliament's right to tax.","Continuity – Taxation without representation remained the core grievance. Change – The Townshend Acts attacked colonial self‑government by making governors and judges financially independent of elected assemblies, which colonists saw as a dangerous precedent.","Townshend Acts vs. Sugar Act. Both were external duties, but the Townshend Acts explicitly aimed to undermine colonial political autonomy (by paying royal officials). The Sugar Act was more about raising revenue and enforcing existing trade regulations."],
        [27,3,"Boston Massacre (1770)","British soldiers fired into a crowd of colonists in Boston, killing five men. The crowd had been taunting the soldiers and throwing snowballs, rocks, and sticks. The event was quickly turned into propaganda by Samuel Adams, Paul Revere, and other Patriots.","Tensions from the presence of British troops (sent after the Townshend Acts); street fights between soldiers and laborers; the 'tarring and feathering' of customs officials; a mob atmosphere.","Increased anti‑British sentiment throughout the colonies. The soldiers were tried (John Adams defended them) and most were acquitted or given light punishment. British troops were withdrawn from Boston to Castle William, temporarily reducing tensions. Paul Revere's engraving of the 'Bloody Massacre' became a powerful Patriot propaganda tool.","Continuity – Military‑civilian clashes continued (Lexington and Concord, 1775). Change – After the Massacre, British troops were removed from Boston (temporary), and the Patriot propaganda effort turned many moderate colonists toward resistance.","Boston Massacre vs. Kent State shootings (1970). Both involved armed forces firing on civilians, both were used as propaganda by anti‑government movements, and both inflamed public opinion. The Boston Massacre killed five; Kent State killed four."],
        [28,3,"Tea Act (1773)","Granted the British East India Company a monopoly on tea sales in the colonies. It actually lowered the price of tea (by eliminating middlemen) but colonists saw it as a trick to make them accept the principle of parliamentary taxation (the tax on tea remained).","The British East India Company was near bankruptcy, with huge tea surpluses. Parliament wanted to save it and also assert its right to tax the colonies.","The Boston Tea Party (December 16, 1773) – members of the Sons of Liberty, disguised as Mohawk Indians, dumped 342 chests of tea into Boston Harbor. This destroyed about £10,000 worth of tea (millions in today's dollars). Similar 'tea parties' occurred elsewhere, but Boston's was the most dramatic.","Continuity – Colonists had resisted monopolies and taxes before (the tea tax had been in place since 1767). Change – The Tea Act lowered the price, but colonists rejected it on principle, showing that the issue was representation, not economic burden. The destruction of property marked an escalation from boycotts to direct action.","Tea Act vs. Stamp Act. Both were British tax/control policies; the Stamp Act caused widespread boycotts and a congress; the Tea Act caused a single dramatic act of destruction (the Tea Party). The Tea Act's lower price ironically made colonists 'buy' the principle of no taxation."],
        [29,3,"Intolerable Acts / Coercive Acts (1774)","British response to the Boston Tea Party. Four acts: (1) Boston Port Act – closed Boston Harbor until the tea was paid for; (2) Massachusetts Government Act – revoked Massachusetts' charter, ended self‑rule, allowed the Crown to appoint the council and judges; (3) Administration of Justice Act – allowed British officials accused of crimes to be tried in Britain; (4) Quartering Act – allowed British troops to be quartered in private homes. Also the Quebec Act (considered by colonists another 'Intolerable Act') expanded Quebec's territory into the Ohio Valley and allowed Catholicism.","Punish Massachusetts for the Tea Party; assert British authority after colonial defiance.","The First Continental Congress (1774) convened to coordinate colonial resistance. Colonists sent supplies to Boston (which was suffering under the port closure). Militias were organized, and 'Minutemen' prepared for armed conflict. The acts united the colonies against Britain as nothing else had.","Continuity – Britain had used punitive acts before (e.g., the Navigation Acts). Change – The Intolerable Acts targeted one colony but united all thirteen. No previous act had closed an entire harbor or dissolved a colonial charter so completely. The Quebec Act also inflamed anti‑Catholic sentiment in mostly Protestant colonies.","Intolerable Acts vs. Navigation Acts. The Navigation Acts restricted trade but left colonial assemblies  in place; the Intolerable Acts dissolved the Massachusetts assembly – a direct attack on self‑government. The Navigation Acts could be smuggled around; the Intolerable Acts provoked armed resistance."],
        [30,3,"First Continental Congress (1774)","Delegates from 12 colonies (Georgia did not attend) met in Philadelphia. They issued a Declaration of Rights and Grievances (affirming loyalty to Britain but denouncing the Intolerable Acts), agreed to a boycott of British goods (the Continental Association), and planned for a second congress if their demands were not met.","The Intolerable Acts; the need for coordinated colonial resistance.","Established colonial unity – though not yet independence. Set up committees to enforce the boycott. Called for the formation of militias. Laid the groundwork for the Second Continental Congress and the Revolution.","Continuity – Colonial assemblies had met before (Stamp Act Congress, 1765). Change – The First Continental Congress was more organized, more unified (12 colonies vs. 9), and prepared for military resistance (unlike the Stamp Act Congress, which only petitioned). It was the first national government in fact, if not in name.","First Continental Congress vs. Second Continental Congress (1775). The First Congress sent petitions to the king and sought redress within the British Empire; the Second Congress convened after Lexington and Concord, managed the war, and issued the Declaration of Independence."],
        [31,3,"Lexington and Concord (April 19, 1775)","'The shot heard round the world.' British troops marched from Boston to Concord to seize colonial military supplies. Minutemen met them at Lexington – a brief skirmish left 8 colonists dead. The British proceeded to Concord, where they were confronted by over 400 militia, who forced them to retreat to Boston under constant fire. 73 British killed, 174 wounded; 49 colonists killed, 39 wounded.","General Gage ordered the seizure of weapons and the arrest of Patriot leaders Samuel Adams and John Hancock. Colonists had prepared militias and intelligence (Paul Revere, William Dawes).","The Revolutionary War began. The Second Continental Congress convened. Colonial militias surrounded Boston, leading to the Battle of Bunker Hill (June 1775). The war was no longer a political debate but an armed conflict.","Continuity – Colonial militias had fought before (French and Indian War). Change – Now they were fighting against the British army, not alongside them. This was the first open military conflict of the Revolution.","Lexington and Concord vs. Fort Sumter (1861). Both were the 'first battles' of major wars; both started over supplies/weapons; both united the opposing side (the North after Fort Sumter, the colonies after Lexington). Lexington was a British sortie into the countryside; Fort Sumter was a Confederate bombardment of a federal fort."],
        [32,3,"Common Sense (January 1776)","Thomas Paine's pamphlet, written in clear, accessible prose. Attacked monarchy and hereditary rule as absurd and contrary to reason. Argued it was 'common sense' for a continent to not be ruled by a distant island. Called for immediate independence.","Growing colonial resentment after Lexington and Concord; many colonists still hoped for reconciliation. Paine's radical ideas and his ability to reach ordinary people.","Sold over 150,000 copies in a few months (in a population of 2.5 million). Pivotal in shifting public opinion from seeking redress within the British Empire to demanding full independence. Influenced the Declaration of Independence's language and tone.","Continuity – Pamphlets had been used before (e.g., John Dickinson's Letters from a Farmer in Pennsylvania, James Otis). Change – Common Sense was far more accessible, sold in massive numbers, and explicitly called for independence (not just rights). It reached people who had never read political philosophy before.","Common Sense vs. Federalist Papers (1787‑88). Common Sense was a revolutionary call to action – emotional, accessible, aimed at the common person. The Federalist Papers were a constitutional defense – analytical, complex, aimed at educated elites. Both were immensely influential but served very different purposes."],
        [33,3,"Declaration of Independence (July 4, 1776)","Written primarily by Thomas Jefferson, based on John Locke's natural rights philosophy (life, liberty, and the pursuit of happiness – Jefferson replaced 'property'). It listed 27 grievances against King George III, declared the colonies 'free and independent states,' and asserted the right to revolution when government becomes destructive of natural rights.","King George III had rejected the Olive Branch Petition, hired Hessian mercenaries, and declared the colonies in rebellion. The war had been ongoing for over a year. Congress realized reconciliation was impossible.","Formalized the revolution – now it was a war for independence, not just rights. Inspired other movements (French Revolution, Latin American independence). Established the American creed of natural rights and government by consent.","Continuity – Locke's ideas had influenced colonists earlier (Otis, Adams, the Suffolk Resolves). Change – Before the Declaration, colonists claimed rights as British subjects under the Constitution; after, they claimed universal natural rights separate from Britain. The Declaration broke all legal and political ties.","Declaration of Independence vs. Declaration of Sentiments (1848). Both follow the same structure – a preamble about natural rights, a list of grievances against an oppressor (the King for the DOI, 'men' for the Sentiments), and a resolution of independence. The Declaration of Sentiments demanded women's equality, including the right to vote."],
        [34,3,"Battle of Saratoga (1777)","Two battles fought in New York – September 19 and October 7. American forces led by Horatio Gates and Benedict Arnold (who was wounded) defeated British General John Burgoyne, who surrendered his entire army of 6,000 on October 17.","British strategy: General Burgoyne would march south from Canada to Albany, while General Howe marched north from New York City, crushing the rebellion between them. But Howe went to Philadelphia instead, leaving Burgoyne isolated and surrounded.","The turning point of the war. Convinced France that the Americans could win, leading to the Treaty of Alliance (1778) – France became a formal military ally, providing troops, a navy, and financial aid. Without French support, victory would have been much harder.","Continuity – Americans had won battles before (Trenton, Princeton). Change – Saratoga was the first major British army surrender, proving Americans could win a conventional battle, not just guerrilla raids. It transformed a colonial rebellion into a global war (France, Spain, Netherlands all joined against Britain).","Saratoga (1777) vs. Yorktown (1781). Saratoga brought France into the war and made victory possible; Yorktown ended the war with Cornwallis's surrender. Saratoga was the strategic turning point; Yorktown was the final decisive victory."],
        [35,3,"Articles of Confederation (ratified 1781)","The first constitution of the United States. Created a weak central government: no power to tax, no executive, no national court system, 9 of 13 states to pass laws, unanimous to amend. Accomplishments: won the Revolutionary War (the government existed during the conflict), negotiated the Treaty of Paris (1783), and passed the Northwest Ordinance (1787), which banned slavery in the Northwest Territory, created a process for admitting new states, and supported public education.","Fear of a strong central government like the British monarchy; the states wanted to retain their sovereignty; the wartime urgency pushed ratification without thorough debate.","Shays' Rebellion (1786‑87) exposed the AOC's fatal weakness – the government could not raise an army or money to suppress the rebellion. The AOC proved unworkable for a growing nation, leading directly to the Constitutional Convention (1787).","Continuity – States remained sovereign, as they had been under colonial rule. Change – The AOC was the first written national constitution, but it was replaced entirely in 1789, not amended. The shift went from a weak central government (AOC) to a much stronger one (Constitution).","Articles of Confederation vs. U.S. Constitution. AOC: weak central, no executive, no judiciary, 9/13 vote, unanimous amendment. Constitution: stronger central, executive branch, federal judiciary, majority vote for most laws, specified amendment process (2/3 of Congress + 3/4 of states). The AOC had no power to tax; the Constitution granted the power to tax directly."],
        [36,3,"Treaty of Paris (1783)","Ended the American Revolutionary War. Britain recognized U.S. independence; U.S. boundaries established as Atlantic Ocean to Mississippi River, Canada to Florida. U.S. agreed to recommend return of Loyalist property.","American victory at Yorktown (1781); British desire to end costly war.","U.S. independent; territory doubled; Loyalists fled; relationship with Britain remained tense (trade, impressment).","Continuity – Post‑war treaties remained essential for peace. Change – First treaty where Britain recognized American sovereignty. Set precedent for later treaties (Pinckney, Jay, etc.).","Treaty of Paris (1783) vs. Treaty of Paris (1763). 1763 ended French & Indian War, gave Britain control of North America; 1783 gave U.S. independence from Britain. Both reshaped North American map."],
        [37,3,"Shays' Rebellion (1786–1787)","An uprising of Massachusetts farmers, many of them Revolutionary War veterans, who were losing their farms to foreclosure due to debt and high taxes. Led by Daniel Shays, they shut down courthouses and marched on the federal arsenal at Springfield. The state militia eventually crushed the rebellion.","Post‑war economic depression; high state taxes (to pay off war debts); lack of paper money; the Articles of Confederation gave Congress no power to raise an army or funds to respond.","Exposed the weakness of the Articles of Confederation – the national government could not maintain order. Convinced many leaders (Washington, Madison, Hamilton) that a stronger federal government was necessary. Led directly to the Constitutional Convention (May 1787).","Continuity – Debtors' rebellions occurred before (Bacon's Rebellion 1676). Change – Shays' Rebellion targeted courthouses, not Native Americans or elite property. It showed that the AOC was incapable of responding to domestic unrest. Under the Constitution, the Whiskey Rebellion (1794) was swiftly crushed by federal troops.","Shays' Rebellion vs. Whiskey Rebellion (1794). Both were farmer uprisings over taxes/debt. Shays' occurred under the Articles and revealed government weakness (Congress could not act). The Whiskey Rebellion occurred under the Constitution, and federal troops crushed it, demonstrating the new government's strength and legitimacy."],
        [38,3,"Constitutional Convention (1787)","Met in Philadelphia from May to September 1787, originally to amend the Articles of Confederation. Instead, the delegates (led by James Madison, Alexander Hamilton, George Washington) wrote an entirely new constitution. Key compromises: Great Compromise – House by population, Senate equal (2 per state); 3/5 Compromise – enslaved counted as 3/5 of a person for representation and taxation; Slave Trade Compromise – Congress could not ban the importation of slaves for 20 years (until 1808); Fugitive Slave Clause – required return of runaway slaves.","Failure of the Articles (Shays' Rebellion); the need for a stronger national government to tax, regulate commerce, and raise an army; competing interests of large vs. small states, slave vs. free states.","Created the U.S. Constitution (ratified 1788). Established separation of powers, checks and balances, federalism, and an executive branch (president). Led to the Bill of Rights (1791) to address Anti‑Federalist concerns.","Continuity – Representative government and the basic structure of colonial assemblies were retained. Change – Dramatically strengthened federal power (power to tax directly, regulate interstate commerce, maintain an army, and make laws binding on states). Added an executive and judicial branch, which the AOC lacked.","Constitutional Convention vs. First Continental Congress (1774). Both met in Philadelphia to address grievances; the First Congress sought redress from Britain within the Empire; the Convention replaced the existing American government entirely. One was political protest; the other was constitution‑making."],
        [39,3,"Federalist Papers (1787–1788)","A series of 85 essays written by Alexander Hamilton, James Madison, and John Jay under the pseudonym 'Publius.' They explained and defended the proposed Constitution, arguing that a strong central government would protect liberty (not destroy it), that the separation of powers and checks and balances would prevent tyranny, and that a large republic could survive and thrive.","Anti‑Federalist opposition to the Constitution (Patrick Henry, George Mason, the 'Brutus' essays). The need to persuade New York and Virginia – two key states – to ratify.","Helped secure ratification, especially in New York. Still used by the Supreme Court to interpret the Constitution (especially 'Federalist No. 10' on factions, 'No. 51' on checks and balances, and 'No. 78' on judicial review).","Continuity – Political pamphlets had been used since the colonial era. Change – The Federalist Papers were the most systematic, sophisticated defense of the Constitution ever written; they are still studied as a primary source for understanding the framers' intentions.","Federalist Papers vs. Anti‑Federalist writings (e.g., 'Brutus,' the 'Cato' letters). Federalists argued for a strong central government, implied powers, and energy in the executive; Anti‑Federalists feared tyranny, demanded a Bill of Rights, and wanted states to retain most power. The Federalists won the ratification debate, but Anti‑Federalist concerns led to the Bill of Rights."],
        [40,3,"Anti‑Federalists & Bill of Rights (1791)","Anti‑Federalists – opponents of the Constitution – feared that the new central government would become tyrannical, trample individual liberties, and destroy state sovereignty. Key figures: Patrick Henry, George Mason, Samuel Adams, Richard Henry Lee. Their demands forced the promise of a Bill of Rights. The Bill of Rights (first 10 amendments) guarantees individual liberties: freedom of speech, press, religion, assembly, petition (1st); right to bear arms (2nd); no quartering of soldiers (3rd); protection against unreasonable searches (4th); due process, double jeopardy, self‑incrimination (5th); rights of the accused (6th); jury in civil cases (7th); no cruel and unusual punishment (8th); enumeration of rights not exhaustive (9th); powers reserved to states (10th).","Fear of a powerful central government like the British monarchy; the original Constitution lacked a bill of rights; ratification was uncertain without one.","The Bill of Rights was added to secure ratification, especially in Virginia and New York. It limited federal power and protected individual liberties. The 10th Amendment (reserved powers) became a cornerstone of states' rights arguments for generations.","Continuity – Suspicion of strong central government persisted (Jeffersonian Democratic‑Republicans, later the Confederacy). Change – The Bill of Rights is now a foundational document of American liberty. The original Constitution had no such protections; the Anti‑Federalists forced them.","Anti‑Federalists vs. Jeffersonian Democratic‑Republicans. Both favored states' rights, strict construction of the Constitution, and feared federal overreach. Anti‑Federalists lost the ratification battle but won the Bill of Rights; Jeffersonian Democratic‑Republicans won the presidency in 1800 and dominated politics for a generation."],
        [41,3,"Republicanism (1760s–1780s)","Political ideology that government should be based on the consent of the governed, with power held by elected representatives (not a monarch). Emphasized civic virtue, opposition to corruption, and the common good.","Enlightenment ideas (Locke, Montesquieu); colonial experience with self‑government; rejection of monarchy.","Foundation for the American Revolution and Constitution; shaped the new state and federal governments; rejected hereditary aristocracy.","Continuity – Republicanism remains core of U.S. political culture. Change – Before Revolution, colonists accepted monarchy; after, republic became the only legitimate form of government for the U.S.","Republicanism vs. Classical Liberalism – Republicanism emphasizes civic virtue, common good, and citizen participation; Liberalism emphasizes individual rights, property, and limited government. Both influenced the Revolution."],
        [42,3,"Hamilton's Financial Plan (1790–1791)","Secretary of the Treasury Alexander Hamilton's 5‑part plan to stabilize the American economy: (1) Assume state debts – federal government would pay off all state debts from the Revolution; (2) Create a national debt – a permanent, managed debt (with bonds) would give creditors a stake in the new nation's success; (3) National Bank (BUS) – a private‑public partnership to hold government funds, issue currency, and facilitate commerce; (4) Whiskey tax – an excise tax on whiskey to raise revenue; (5) Protective tariff – a tax on imported goods to protect American manufacturing.","After the Revolution, the U.S. had huge debts, no stable currency, and weak credit. States had competing interests. The economy was in crisis.","Jefferson and Madison opposed the National Bank as unconstitutional (strict construction – the Constitution does not explicitly authorize a bank). Hamilton argued for loose construction (the Necessary and Proper Clause allowed implied powers). The bank was chartered in 1791. The plan created the first political parties: Federalists (Hamilton, pro‑bank, pro‑British, loose construction) vs. Democratic‑Republicans (Jefferson, anti‑bank, pro‑French, strict construction).","Continuity – Government debt management existed before (under the AOC). Change – Hamilton's plan used federal assumption of state debts and a national bank – precedents for strong federal economic power. The debate over strict vs. loose construction continues to this day.","Hamilton vs. Jefferson economic visions. Hamilton: industrial, national bank, loose construction, protective tariffs, pro‑Britain. Jefferson: agrarian, no bank, strict construction, free trade, pro‑France. Their debate created the first party system."],
        [43,3,"Whiskey Rebellion (1794)","Farmers in western Pennsylvania protested the federal excise tax on whiskey – a tax designed by Hamilton to raise revenue. They tarred and feathered tax collectors, attacked the homes of officials, and threatened to march on Pittsburgh. President Washington led about 13,000 federal troops (larger than any army he ever commanded during the Revolution) to crush the rebellion. The insurgents dispersed without a fight.","Hamilton's whiskey tax; frontier farmers used whiskey as currency and barter; they felt the tax was unfair (like the hated Stamp Act) and that the federal government was ignoring their interests.","Proved that the new federal government could enforce its laws and maintain order – a direct contrast to the impotence of the Articles during Shays' Rebellion. Demonstrated the legitimacy and strength of the Constitution. Washington's use of force was controversial but effective.","Continuity – Farmer tax rebellions continued (Fries Rebellion 1799). Change – Under the Articles, the government could not respond to Shays' Rebellion; under the Constitution, the government crushed the Whiskey Rebellion. This contrast showed that the new federal government was far more powerful and credible.","Whiskey Rebellion vs. Shays' Rebellion (1786‑87). Shays occurred under the Articles – the government could not respond, and the rebellion was crushed by state militia. The Whiskey Rebellion occurred under the Constitution – the federal government raised a massive army and crushed it. Different outcomes demonstrated the Constitution's effectiveness."],
        [44,3,"Jay's Treaty (1795)","Treaty negotiated by Chief Justice John Jay with Great Britain. The British agreed to evacuate their forts in the Northwest Territory (which they should have done in 1783). In exchange, the U.S. agreed to pay pre‑Revolutionary debts owed to British creditors. The treaty did not resolve impressment of American sailors, nor did it stop British interference with neutral trade.","Ongoing tensions with Britain: they had not left the western forts, they were arming Native Americans, and they were impressing American sailors. War seemed possible. Washington sent Jay to negotiate a peaceful resolution.","The treaty was highly unpopular in the U.S. – Thomas Jefferson and his supporters saw it as a sellout to Britain and an insult to France, America's Revolutionary ally. It further divided Federalists (pro‑treaty) and Democratic‑Republicans (anti‑treaty). It angered France, leading to the XYZ Affair and an undeclared naval war (Quasi‑War). However, it avoided war with Britain, which was desirable given the young nation's weakness.","Continuity – The U.S. continued to avoid European wars (Washington's neutrality policy). Change – Jay's Treaty marked a clear tilt toward Britain (commercially) and away from France, breaking the alliance of 1778 and setting the stage for a decade of tensions with France.","Jay's Treaty vs. Pinckney's Treaty (1795). Both were negotiated in 1795. Jay's Treaty with Britain was unpopular and did not resolve key issues (impressment). Pinckney's Treaty with Spain was very popular – it granted the U.S. navigation rights on the Mississippi River and the right of deposit at New Orleans, opening western trade. Pinckney's succeeded in part because Spain feared an Anglo‑American alliance after Jay's Treaty."],
        [45,3,"Pinckney's Treaty (1795)","Treaty with Spain negotiated by Thomas Pinckney. Spain granted the U.S. the right of deposit at New Orleans (allowing American goods to be transferred from riverboats to ocean‑going ships) and the navigation rights on the Mississippi River. It also set the boundary between the U.S. and Spanish Florida at the 31st parallel.","Spain feared that the U.S. and Britain would ally after Jay's Treaty (1795), leaving Spain isolated and vulnerable in North America. Spain also sought to avoid war with the growing American nation.","Opened the interior of the continent to American trade and settlement. Reduced tensions with Spain, freeing the U.S. to expand westward. It was the most popular treaty of the 1790s – even Jefferson praised it.","Continuity – The U.S. continued to negotiate commercial treaties with European powers. Change – Pinckney's Treaty gave the U.S. control of the Mississippi River, which had been closed by Spain since the Revolution. This enabled the westward expansion that would explode under Jefferson.","Pinckney's Treaty vs. Jay's Treaty (1795). Pinckney's was popular, gained significant economic rights (Mississippi navigation), and reduced tensions; Jay's was unpopular, avoided war but angered France, and did not resolve impressment. Both demonstrated that the U.S. could negotiate with European powers, but Pinckney's was far more successful."],
        [46,3,"Washington's Farewell Address (1796)","Washington's final public message (written with Hamilton), published in a newspaper, not delivered as a speech. He announced his decision not to seek a third term, establishing a two‑term precedent. He warned against two dangers: (1) political parties (factions) – they would divide the nation and undermine republican government; (2) permanent foreign alliances – the U.S. should avoid entangling alliances and instead seek temporary commercial relationships.","Washington was exhausted and wanted to retire; he also wanted to guide future policy and warn the young nation against the partisanship he had witnessed in his own cabinet (Hamilton vs. Jefferson).","Established the two‑term tradition (broken only by FDR, then made law by the 22nd Amendment). Influenced U.S. foreign policy for over 150 years – the U.S. largely avoided permanent alliances until NATO (1949). His warning about parties proved prophetic – they had already formed and would intensify.","Continuity – U.S. foreign policy remained isolationist in spirit until WWII. Change – Political parties became permanent, despite Washington's warning. The two‑term precedent lasted until 1940; it is now law.","Washington's Farewell Address vs. Monroe Doctrine (1823). Both are foundational foreign policy statements. Washington warned against foreign alliances; Monroe warned Europe not to interfere in the Western Hemisphere. Together they formed the U.S. policy of unilateralism in the Americas."],
        [47,3,"XYZ Affair (1797–1798)","President John Adams sent a diplomatic mission to France to negotiate an end to French attacks on American shipping. French foreign minister Talleyrand's agents (coded X, Y, and Z in published dispatches) demanded a $250,000 bribe just to begin negotiations, plus a $10 million loan to France. The Americans refused and broke off talks.","France was angry about Jay's Treaty (1795), which favored Britain. The French had begun seizing American ships and breaking diplomatic relations. An undeclared naval war (the Quasi‑War) was already underway.","Anti‑French sentiment exploded in the U.S. – 'Millions for defense, not one cent for tribute!' Congress created a navy and authorized attacks on French ships. The Quasi‑War (1798‑1800) was an undeclared naval conflict. The crisis led to the Alien and Sedition Acts (1798). Adams eventually negotiated a peaceful end (Convention of 1800), but his own party (Federalists) turned against him for doing so.","Continuity – European powers continued to disrespect American neutrality. Change – The XYZ Affair turned the U.S. from a French ally (1778) to a quasi‑enemy (1798‑1800). It led to a military buildup under Adams (the Navy was expanded) and to suppression of dissent at home (Alien and Sedition Acts).","XYZ Affair vs. Zimmermann Telegram (1917). Both were foreign attempts to demand or propose something offensive to the U.S. – the French demanded a bribe; the Germans proposed a military alliance with Mexico against the U.S. Both outraged Americans and pushed the nation toward war."],
        [48,3,"Alien and Sedition Acts (1798)","Four laws passed by the Federalist‑controlled Congress during the Quasi‑War with France: (1) Naturalization Act – raised the residency requirement for citizenship from 5 to 14 years; (2) Alien Friends Act – allowed the president to deport any non‑citizen deemed 'dangerous'; (3) Alien Enemies Act – allowed deportation of non‑citizens from enemy nations during wartime; (4) Sedition Act – made it a crime to publish 'false, scandalous, and malicious' criticism of the government or its officials.","Federalist fear of foreign influence (many Democratic‑Republicans were recent immigrants, especially from France and Ireland); fear that French revolutionary radicalism would spread to the U.S.; the Quasi‑War with France.","The acts were used almost exclusively against Democratic‑Republican newspapers and editors (10 were convicted). They outraged Jefferson and Madison, who wrote the Kentucky and Virginia Resolutions (1798‑99) arguing that states could nullify unconstitutional federal laws. The backlash helped Jefferson win the election of 1800. The Alien Friends Act expired, the Naturalization Act was repealed, and the Sedition Act ended in 1801. Most of the acts were later deemed unconstitutional; the Sedition Act is now widely condemned as a violation of free speech.","Continuity – Wartime suppression of dissent continued (Espionage and Sedition Acts of 1917‑18). Change – The Alien and Sedition Acts were the first major federal laws targeting political speech and immigrants. They set a precedent for using national security fears to suppress political opposition.","Alien and Sedition Acts (1798) vs. Espionage and Sedition Acts (1917‑18). Both were passed during undeclared/declared wars (Quasi‑War, WWI). Both suppressed dissent and targeted political opponents (Democratic‑Republicans then; socialists and anti‑war activists later). Both expired or were repealed, and both are now criticized as overreaches."],
        [49,3,"Kentucky and Virginia Resolutions (1798–1799)","Resolutions secretly written by James Madison (Virginia) and Thomas Jefferson (Kentucky) in response to the Alien and Sedition Acts. They argued that the states were parties to the Constitution (the compact theory) and therefore had the right to nullify unconstitutional acts of the federal government. The Kentucky Resolution (Jefferson) explicitly used the word 'nullification' and argued that states could 'interpose' between the federal government and the people.","The Alien and Sedition Acts, which Democratic‑Republicans saw as a Federalist power grab and an assault on liberty.","They were not accepted by other states (most rejected them). But they became the theoretical foundation for later states' rights arguments, especially John C. Calhoun's nullification theory in the 1830s and eventually secession in 1860‑61. They are considered foundational documents of the states' rights tradition.","Continuity – States' rights arguments persisted throughout American history. Change – The Resolutions pushed nullification theory to its logical extreme – that states could declare federal laws void within their borders. This theory was rejected by the Supreme Court (e.g., McCulloch v. Maryland, 1819) and by the outcome of the Civil War. However, it remained a powerful political argument.","Kentucky and Virginia Resolutions vs. South Carolina Exposition and Protest (1828, John C. Calhoun). Both argued nullification of federal laws (the Alien and Sedition Acts in 1798; the Tariff of Abominations in 1828). The 1798 Resolutions were written in secret and did not lead to immediate action; Calhoun's 1828 Exposition was public and led to the Nullification Crisis (1832‑33). Both were rejected by the federal government, but the theory lived on."],
        [50,3,"Revolution of 1800 (Election of 1800)","The presidential election between incumbent Federalist John Adams and Democratic‑Republican Thomas Jefferson. The election was a tie between Jefferson and his running mate Aaron Burr, throwing the election to the House of Representatives. After 36 ballots, Hamilton (despite disliking Jefferson) helped swing the vote to Jefferson, who became president; Burr became vice president. This led to the 12th Amendment (separate ballots for president and vice president).","Backlash against the Alien and Sedition Acts; opposition to Federalist policies (high taxes, pro‑British foreign policy); the Federalist party was divided (Hamilton and Adams feuded).","First peaceful transfer of power between opposing political parties in modern history – a remarkable achievement. Marked the decline of the Federalist Party and the beginning of Democratic‑Republican dominance (Jefferson, Madison, Monroe – 24 consecutive years). Established the precedent that power could change hands without violence or revolution.","Continuity – Peaceful transitions of power became a hallmark of American democracy (unique in the world at that time). Change – Before 1800, the presidency had only transferred from Washington to Adams (same party). After 1800, an opposing party peacefully took power, showing that the constitutional system worked. This was the first time in history that a national leader voluntarily gave power to a rival party after an election.","Revolution of 1800 vs. Election of 1860. Both were transformative elections. 1800 transferred power peacefully from Federalists to Democratic‑Republicans; 1860 led to secession and Civil War (because the nation was divided over slavery). 1800 showed the system's resilience; 1860 showed its fragility under extreme sectional stress."],
        [51,3,"Louisiana Purchase (1803)","Jefferson bought from France for $15 million – doubled the size of the United States. The territory stretched from the Mississippi River to the Rocky Mountains. Jefferson was a strict constructionist (believing the Constitution did not authorize such purchases), but he made the deal anyway, using loose construction – ironic given his philosophy.","Napoleon needed money for his European wars; he had lost control of Haiti (the slave revolt succeeded). The U.S. wanted control of New Orleans, which Spain had recently returned to France.","Opened vast western lands for settlement; fueled westward expansion (Manifest Destiny); exacerbated the slavery debate – what would be the status of slavery in these new territories? It led directly to the Missouri Compromise (1820). Jefferson sent the Lewis and Clark expedition (1804‑06) to explore the territory.","Continuity – Westward expansion continued (Texas, Oregon, Mexican Cession). Change – Jefferson's strict construction gave way to loose construction for this purchase – a precedent for executive power in territorial acquisition. Without the purchase, the U.S. might have remained a small Atlantic nation.","Louisiana Purchase vs. Mexican Cession (1848). Both added vast territories. The Louisiana Purchase was a peaceful purchase from France (Napoleon needed cash). The Mexican Cession was taken by war. Both ignited fierce debates over slavery expansion."],
        [52,3,"Marbury v. Madison (1803)","Supreme Court case under Chief Justice John Marshall. William Marbury was a 'midnight judge' appointed by President Adams; Secretary of State Madison (under Jefferson) refused to deliver Marbury's commission. Marbury sued. The Court ruled that Marbury had a right to his commission, but that the law giving the Court the power to force its delivery (Section 13 of the Judiciary Act of 1789) was unconstitutional. Thus, the Court established judicial review – the power to declare laws unconstitutional.","Adams's 'midnight judges' appointments on his last night in office; Jefferson ordered Madison not to deliver them; Marbury sued.","Established the Supreme Court's power to strike down acts of Congress – a cornerstone of judicial authority. Marshall avoided a confrontation with Jefferson (by ruling against Marbury on technical grounds) while simultaneously asserting the Court's power. Judicial review is used to this day.","Continuity – Courts had always interpreted laws. Change – Marbury was the first time the Supreme Court declared a federal law unconstitutional. It made the Court a co‑equal branch of government.","Marbury v. Madison vs. McCulloch v. Maryland (1819). Both were Marshall Court cases. Marbury established judicial review; McCulloch established implied powers and federal supremacy. Both expanded federal power – one through the judiciary, the other through Congress."],
        [53,3,"Embargo Act (1807)","Jefferson banned all foreign trade – American ships could not sail to any foreign port. The goal was to pressure Britain and France to stop interfering with American shipping (impressment, seizure of cargo). It was a voluntary 'peaceful coercion.'","British impressment of American sailors; French and British violations of neutral rights; Jefferson hoped to avoid war.","Crippled the U.S. economy – exports fell 80%, ports were devastated, smuggling exploded. It was massively unpopular, especially in New England. Jefferson repealed it in 1809, replacing it with the Non‑Intercourse Act (which banned trade only with Britain and France). The Embargo Act failed to change British or French policy and contributed to the War of 1812.","Continuity – The U.S. continued to use trade as a diplomatic weapon (later embargoes, e.g., against Cuba, Iran). Change – The Embargo Act hurt the U.S. more than Europe, demonstrating the limits of economic coercion when the U.S. was not yet an industrial power. It was widely seen as a disaster.","Embargo Act vs. Non‑Intercourse Act (1809). The Embargo banned all foreign trade; the Non‑Intercourse Act banned trade only with Britain and France (and allowed trade with other nations). Both failed to change British or French behavior; the Embargo was far more damaging to the U.S. economy."],
        [54,3,"War of 1812 (1812–1815)","The 'Second War of Independence.' Fought between the U.S. and Britain over impressment, British forts in the Northwest Territory, and British support for Native American resistance (Tecumseh). The war ended in a stalemate; the Treaty of Ghent (Dec 24, 1814) restored pre‑war boundaries. The war's most famous battle (the Battle of New Orleans) was fought after the treaty was signed (Jan 8, 1815), making Andrew Jackson a national hero.","British impressment of U.S. sailors; British arming of Native Americans on the frontier; 'War Hawks' in Congress (Henry Clay, John C. Calhoun) wanted to invade Canada; Westerners blamed Britain for Native attacks.","Increased American nationalism – the 'Era of Good Feelings' (1815‑1825). Ended the Federalist Party (the Hartford Convention of 1814 was seen as treasonous). Spurred American manufacturing (the British blockade forced domestic production). Confirmed U.S. independence and legitimacy on the world stage. Andrew Jackson became a national hero, leading to his presidency.","Continuity – Anglo‑American tensions continued, but after 1815, they were resolved diplomatically (no more war). Change – Before 1812, the U.S. was militarily weak and often bullied; after, it gained respect (though not from Britain). The Federalist Party, which had dominated early national politics, collapsed.","War of 1812 vs. American Revolution. Both were fought against Britain. The Revolution won independence; the War of 1812 ended in a stalemate but confirmed that independence. The Revolution had a French alliance; the War of 1812 had no major ally. The Revolution created the nation; the War of 1812 cemented its identity."],
        [55,3,"Tecumseh and Tenskwatawa (c. 1805–1813)","Pan‑Indian resistance movement. Tecumseh was a Shawnee war chief; his brother Tenskwatawa ('The Prophet') was a religious leader. They united tribes from the Great Lakes to the Gulf of Mexico to resist American expansion. They founded Prophetstown at the confluence of the Wabash and Tippecanoe rivers. Tenskwatawa led a disastrous attack on William Henry Harrison's forces at the Battle of Tippecanoe (1811), while Tecumseh was away recruiting.","U.S. westward expansion; the Treaty of Fort Wayne (1809), which took millions of acres of Native land without the consent of all tribes; Tecumseh saw that only unity could stop American encroachment.","The movement allied with the British in the War of 1812. Tecumseh fought alongside British forces and was killed at the Battle of the Thames (1813). After his death, the confederacy collapsed. Without Tecumseh, no pan‑Indian resistance on that scale occurred again until the 20th century.","Continuity – Native resistance to American expansion continued (Seminole Wars, Black Hawk War). Change – Tecumseh's confederacy was the most organized, multi‑tribal resistance movement in American history. After his death, no comparable pan‑Indian leader emerged.","Tecumseh vs. Pontiac (1763). Both led pan‑Indian resistance; Pontiac fought the British after the French and Indian War; Tecumseh fought the Americans, allied with the British. Both were killed in or near battle; both movements collapsed after their deaths."],
        [56,3,"Second Great Awakening (c. 1790–1840s)","A Protestant religious revival emphasizing human perfectibility, free will (Arminianism, not Calvinist predestination), and moral reform. Charles Finney led massive revivals in the 'Burned‑Over District' of western New York. The movement inspired a wave of social reforms: temperance, abolitionism, women's rights, prison reform, and public education.","Reaction against the rationalism of the Enlightenment and the deism of the Founding Fathers; anxiety over rapid social changes (Market Revolution, immigration); a desire for emotional, heartfelt religion.","Inspired reform movements that reshaped American society: the temperance movement (American Temperance Society, 1826); the abolitionist movement (William Lloyd Garrison, Frederick Douglass); women's rights (Seneca Falls, 1848); education reform (Horace Mann); mental health reform (Dorothea Dix). The Awakening also increased denominational diversity (Baptists, Methodists, Mormons).","Continuity – Religious revivals occurred before (First Great Awakening, 1730s‑70s). Change – The Second Great Awakening focused on social reform – making society perfect, not just saving individual souls. The First Great Awakening challenged church authority; the Second challenged social structures (slavery, alcohol, prisons).","Second Great Awakening vs. First Great Awakening. First: emotional preaching (Whitefield, Edwards), challenged established churches, focused on individual salvation. Second: also emotional (Finney), but focused on moral and social reform (abolition, temperance, women's rights). The Second had far more direct political consequences."],
        [57,3,"Missouri Compromise (1820)","Congressional agreement to resolve the debate over slavery in the Louisiana Purchase territory. Missouri was admitted as a slave state, Maine as a free state (to keep the balance of power in the Senate). The compromise also established the 36°30' line: slavery was prohibited north of that line in the Louisiana Territory (except Missouri).","Missouri applied for statehood as a slave state, which would have tipped the Senate balance in favor of the South (there were already 11 free states and 11 slave states). Northern congressmen refused to admit Missouri as a slave state without a free state paired.","Temporarily resolved the sectional conflict – it lasted 34 years. Postponed the Civil War. Set a precedent that Congress could limit slavery geographically. The line became a political flashpoint; the Kansas‑Nebraska Act (1854) repealed it, leading to 'Bleeding Kansas.'","Continuity – Sectional balance was maintained (more or less) until 1850. Change – Before 1820, there was no geographic restriction on slavery in the Louisiana Territory (except the Northwest Ordinance of 1787, which applied to the Old Northwest). The Missouri Compromise was the first time Congress drew a line across the continent to separate free and slave territory.","Missouri Compromise vs. Compromise of 1850. The Missouri Compromise set a geographical line (36°30'). The Compromise of 1850 used popular sovereignty (let the people of each territory decide) and included a strict Fugitive Slave Law. The Missouri Compromise lasted 34 years; the Compromise of 1850 lasted only 4 years before being undone by the Kansas‑Nebraska Act."]

        [64,4,"Missouri Compromise (1820)","Congressional agreement to resolve the debate over slavery in the Louisiana Purchase territory. Missouri was admitted as a slave state, Maine as a free state (to keep the balance of power in the Senate). The compromise also established the 36°30' line: slavery was prohibited north of that line in the Louisiana Territory (except Missouri).","Missouri applied for statehood as a slave state, which would have tipped the Senate balance in favor of the South (there were already 11 free states and 11 slave states). Northern congressmen refused to admit Missouri as a slave state without a free state paired.","Temporarily resolved the sectional conflict – it lasted 34 years. Postponed the Civil War. Set a precedent that Congress could limit slavery geographically. The line became a political flashpoint; the Kansas‑Nebraska Act (1854) repealed it, leading to 'Bleeding Kansas.'","Continuity – Sectional balance was maintained (more or less) until 1850. Change – Before 1820, there was no geographic restriction on slavery in the Louisiana Territory (except the Northwest Ordinance of 1787, which applied to the Old Northwest). The Missouri Compromise was the first time Congress drew a line across the continent to separate free and slave territory.","Missouri Compromise vs. Compromise of 1850. The Missouri Compromise set a geographical line (36°30'). The Compromise of 1850 used popular sovereignty (let the people of each territory decide) and included a strict Fugitive Slave Law. The Missouri Compromise lasted 34 years; the Compromise of 1850 lasted only 4 years before being undone by the Kansas‑Nebraska Act."],
        [65,4,"Monroe Doctrine (1823)","President James Monroe's annual message to Congress declared that the Western Hemisphere was no longer open to European colonization. It warned European powers not to interfere in the newly independent Latin American republics, and any attempt to do so would be seen as a hostile act toward the U.S. The doctrine also promised that the U.S. would not interfere in European affairs.","Fear that the 'Holy Alliance' (Russia, Prussia, Austria) would help Spain reconquer its former colonies in Latin America; the U.S. wanted to protect its southern flank and assert its influence.","Became a cornerstone of U.S. foreign policy for over 200 years. However, the U.S. had no navy to enforce it; the doctrine was effectively enforced by the British Royal Navy (which wanted access to Latin American markets). Later presidents (especially Theodore Roosevelt) expanded it with the Roosevelt Corollary (1904), which gave the U.S. the right to intervene in Latin American affairs.","Continuity – The U.S. continued to assert hemispheric dominance (Roosevelt Corollary, Cold War interventions). Change – In 1823, the U.S. was a weak power; the doctrine was mostly bluster. By the end of the 19th century, the U.S. could enforce it alone. The doctrine evolved from 'Europe stay out' to 'America can intervene.'","Monroe Doctrine vs. Roosevelt Corollary (1904). Monroe: Europe should not colonize or interfere in the Americas. Roosevelt: The U.S. has the right to exercise 'international police power' in the Western Hemisphere to prevent European intervention. Monroe was defensive; Roosevelt was aggressive and interventionist."],
        [66,4,"Expansion of Democracy (1820s)","The elimination of property qualifications for voting for white men. By the 1820s, most states had removed the requirement that voters own a certain amount of land or property. This expanded the electorate dramatically, especially in the West and among urban workers.","Jacksonian democracy – the belief that ordinary white men should have the right to vote; the frontier states (which never had property requirements) set an example; the Panic of 1819 led to foreclosures, and many believed that if men fought and paid taxes, they should vote; the rise of the Democratic Party.","Andrew Jackson was elected in 1828 as the 'Common Man' president. The rise of the Second Party System (Democrats vs. Whigs) with mass‑based parties, conventions, and political machines. Voter turnout soared (80% or more). However, voting remained restricted to men, and in the South, Black men (free or enslaved) could not vote; Native Americans and women also remained excluded.","Continuity – Voting remained restricted to men for another 100 years (19th Amendment, 1920). Change – Before the 1820s, most states required property ownership; after, universal white male suffrage became the norm. This was a shift from elite democracy to mass democracy, with profound consequences for American politics.","Expansion of democracy (1820s) vs. 15th Amendment (1870) vs. 19th Amendment (1920). The 1820s expansion applied only to white men. The 15th Amendment (1870) gave Black men the vote – but it was systematically denied in the South. The 19th Amendment (1920) gave women the vote. Each wave expanded the electorate, but not all were equally enforced."],
        [67,4,"Jackson's Presidency (1829–1837)","Andrew Jackson, the first 'Common Man' president. He used the spoils system ('rotation in office' – replacing federal employees with his political supporters); relied on an informal kitchen cabinet (his friends and advisors, not the official cabinet); and used the veto more than all previous presidents combined (12 vetoes; 6 were policy‑based, not constitutional). He embodied the rise of the Democratic Party and the Second Party System (Democrats vs. Whigs).","The expansion of democracy; the backlash against the 'corrupt bargain' of 1824 (when John Quincy Adams was elected by the House after Jackson won the popular vote but not the electoral college majority); Jackson's personal popularity as a military hero (Battle of New Orleans).","Strengthened the executive branch – Jackson aggressively used the veto and asserted presidential authority. Modernized political parties (spoils system made party loyalty key to government jobs). His policies (Indian Removal, Bank War, Nullification Crisis) defined the era and intensified sectional tensions.","Continuity – Strong executive presidents followed (Lincoln, T. Roosevelt, FDR). Change – Jackson used the veto more than all previous presidents combined; he also aggressively ignored Supreme Court rulings (Worcester v. Georgia, 1832). He transformed the presidency from a weak office to a powerful one.","Jackson vs. Jefferson. Both were Democratic‑Republicans (though Jackson's party evolved into the Democrats). Jefferson: strict construction, reduced the power of the executive (pardoned those convicted under Alien and Sedition Acts, cut the military budget). Jackson: expanded executive power, used the veto aggressively, and acted above the law (ignoring the Supreme Court). Jefferson feared strong central government; Jackson was the strong central government (except for the Bank)."],
